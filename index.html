    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Apple Touch Icon – wird per JavaScript als PNG aus Canvas generiert -->
    <link rel="apple-touch-icon" sizes="180x180" id="appleTouchIcon" href="" />

    <!-- Safari-Theme-Farbe (Statusleiste) – dunkel + hell -->
    <meta name="theme-color" content="#1a237e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Preconnect für externe APIs -->
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" />
    <link rel="preconnect" href="https://photon.komoot.io" />
    <link rel="preconnect" href="https://api.open-meteo.com" />

    <!-- Apple Touch Icon als echtes PNG via Canvas generieren (iOS-kompatibel) -->
    <script>
        (function() {
            try {
                var c = document.createElement('canvas');
                c.width = 180;
                c.height = 180;
                var ctx = c.getContext('2d');

                // Hintergrund: abgerundetes Rechteck mit Farbverlauf
                var grd = ctx.createLinearGradient(0, 0, 180, 180);
                grd.addColorStop(0, '#1a237e');
                grd.addColorStop(1, '#283593');

                var r = 32;
                ctx.beginPath();
                ctx.moveTo(r, 0);
                ctx.lineTo(180 - r, 0);
                ctx.quadraticCurveTo(180, 0, 180, r);
                ctx.lineTo(180, 180 - r);
                ctx.quadraticCurveTo(180, 180, 180 - r, 180);
                ctx.lineTo(r, 180);
                ctx.quadraticCurveTo(0, 180, 0, 180 - r);
                ctx.lineTo(0, r);
                ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.closePath();
                ctx.fillStyle = grd;
                ctx.fill();

                // Sonne
                var sx = 64, sy = 68, sr = 26;
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd54f';
                ctx.fill();

                // Sonnenstrahlen
                ctx.strokeStyle = '#ffd54f';
                ctx.lineWidth = 3.5;
                ctx.lineCap = 'round';
                var rays = [
                    [sx, sy - sr - 6, sx, sy - sr - 14],
                    [sx, sy + sr + 6, sx, sy + sr + 14],
                    [sx - sr - 6, sy, sx - sr - 14, sy],
                    [sx + sr + 6, sy, sx + sr + 14, sy],
                    [sx - sr*0.7 - 5, sy - sr*0.7 - 5, sx - sr*0.7 - 11, sy - sr*0.7 - 11],
                    [sx + sr*0.7 + 5, sy + sr*0.7 + 5, sx + sr*0.7 + 11, sy + sr*0.7 + 11],
                    [sx + sr*0.7 + 5, sy - sr*0.7 - 5, sx + sr*0.7 + 11, sy - sr*0.7 - 11],
                    [sx - sr*0.7 - 5, sy + sr*0.7 + 5, sx - sr*0.7 - 11, sy + sr*0.7 + 11],
                ];
                for (var i = 0; i < rays.length; i++) {
                    ctx.beginPath();
                    ctx.moveTo(rays[i][0], rays[i][1]);
                    ctx.lineTo(rays[i][2], rays[i][3]);
                    ctx.stroke();
                }

                // Regenwolke
                ctx.fillStyle = '#78909c';
                ctx.beginPath();
                ctx.moveTo(92, 112);
                ctx.quadraticCurveTo(90, 102, 100, 100);
                ctx.quadraticCurveTo(102, 90, 114, 92);
                ctx.quadraticCurveTo(118, 80, 132, 86);
                ctx.quadraticCurveTo(140, 76, 148, 88);
                ctx.quadraticCurveTo(156, 82, 160, 94);
                ctx.quadraticCurveTo(162, 102, 155, 106);
                ctx.lineTo(100, 108);
                ctx.quadraticCurveTo(92, 108, 92, 112);
                ctx.fill();

                // Regentropfen
                ctx.strokeStyle = '#42a5f5';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.globalAlpha = 0.7;
                var drops = [
                    [126, 102, 126, 90],
                    [132, 102, 132, 90],
                    [138, 102, 138, 90],
                ];
                for (var j = 0; j < drops.length; j++) {
                    ctx.beginPath();
                    ctx.moveTo(drops[j][0], drops[j][1]);
                    ctx.lineTo(drops[j][2], drops[j][3]);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;

                // Als PNG Data-URI setzen
                var link = document.getElementById('appleTouchIcon');
                if (link) {
                    link.href = c.toDataURL('image/png');
                }
            } catch(e) {
                console.log('Icon-Generierung fehlgeschlagen:', e);
            }
        })();
    </script>

    <style>
        :root {
            /* Primärfarben */
            --primary-dark: #0c1445;
            --primary-mid: #1a237e;
            --primary-light: #283593;
            --accent: #42a5f5;
            --accent-dark: #1e88e5;

            /* Textfarben */
            --text-primary: #e0e0e0;
            --text-secondary: #b0bec5;
            --text-muted: #78909c;
            --text-label: #90caf9;

            /* Regen-Level (Semantik) */
            --dry: #66bb6a;
            --light-rain: #ffd54f;
            --moderate-rain: #ffb74d;
            --heavy-rain: #ef5350;

            /* Hintergründe */
            --bg-card: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.12);

            /* Shadows */
            --shadow-sm: 0 0 20px rgba(102, 187, 106, 0.15);
            --shadow-md: 0 6px 20px rgba(66, 165, 245, 0.4);

            /* Layout */
            --radius: 10px;
            --radius-card: 16px;
            --radius-lg: 12px;

            /* Font */
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            min-height: 100dvh;
        }

        html {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-mid) 50%, var(--primary-light) 100%);
        }

        body {
            font-family: var(--font);
            background: transparent;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            padding-top: calc(env(safe-area-inset-top, 0px) + 2rem);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
            color: var(--text-primary);
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 
         * iOS Standalone (Homescreen) Korrektur:
         * Safari rendert den Content unter der Statusleiste.
         * Extra Safe-Area-Padding für App-Container, damit die
         * Überschrift nicht in die Kameraaussparung (Notch) ragt.
         */
        @media all and (display-mode: standalone) {
            body {
                padding-top: calc(env(safe-area-inset-top, 0px) + 0.5rem);
            }
            .app-container {
                padding-top: env(safe-area-inset-top, 0px);
            }
            h1 {
                margin-top: 0;
                padding-top: 0.25rem;
            }
        }

        /* Sanfter Light-Mode für Leute mit heller System-Einstellung */
        @media (prefers-color-scheme: light) {
            :root {
                --primary-dark: #e8eaf6;
                --primary-mid: #c5cae9;
                --primary-light: #9fa8da;
                --text-primary: #1a1a2e;
                --text-secondary: #455a64;
                --text-muted: #607d8b;
                --text-label: #3949ab;
                --bg-card: rgba(255, 255, 255, 0.6);
                --bg-input: rgba(255, 255, 255, 0.5);
                --border-color: rgba(0, 0, 0, 0.12);
            }
            html {
                background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 50%, #9fa8da 100%);
            }
            input, select {
                color: #1a1a2e;
                background: rgba(255, 255, 255, 0.6);
                border-color: rgba(0, 0, 0, 0.2);
            }
            input::placeholder {
                color: rgba(0, 0, 0, 0.35);
            }
            input:focus, select:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.25);
            }
            .card {
                background: var(--bg-card);
                border-color: rgba(0, 0, 0, 0.12);
                backdrop-filter: blur(16px);
            }
            .detail-item .value {
                color: #1a1a2e;
            }
            .detail-item .label {
                color: var(--text-muted);
            }
            .timeline-point .point-time {
                color: var(--text-muted);
            }
            .timeline-point .point-weather {
                color: var(--text-secondary);
            }
        }

        /* Respektiert "Bewegung reduzieren"-Einstellung */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .verdict.level-heavy {
                animation: none;
            }

        /* Selektierbare Elemente wieder aktivieren */

            -webkit-user-select: text;
            user-select: text;

            font-size: 2.2rem;

        /* Dropdown über benachbarte Felder legen */

        .swap-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);

            cursor: pointer;

            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s, transform 0.2s, opacity 0.2s;
            outline: none;
            line-height: 1;
            padding: 0;
            z-index: 1;
        }

        .swap-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-50%) rotate(180deg);
        }

        .swap-btn:active {
            transform: translateY(-50%) rotate(180deg) scale(0.9);
        }

        .geo-btn {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-label);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s, transform 0.2s, opacity 0.2s;
            outline: none;
            line-height: 1;
            padding: 0;
            z-index: 1;
        }

        .geo-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-50%) scale(1.05);
        }

        .geo-btn:active {
            transform: translateY(-50%) scale(0.9);
        }

        .geo-btn.loading {
            pointer-events: none;
            opacity: 0.6;
        }

        .geo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .suggestions-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            max-height: 220px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .suggestions-dropdown.visible {
            display: block;
        }

        .suggestion-item {
            padding: 0.65rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover,
        .suggestion-item.highlighted {
            background: #e3f2fd;
            color: #1565c0;
        }

        .suggestion-item .suggestion-type {
            font-size: 0.65rem;
            color: #42a5f5;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        .suggestion-item strong {
            color: #e65100;
            font-weight: 800;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
        }

        .suggestions-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .suggestions-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }

        .suggestions-dropdown::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 3px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-label);
            margin-bottom: 0.4rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            outline-offset: 2px;
            -webkit-appearance: none;
            appearance: none;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.25);
        }

        /* Verbesserte Fokus-Ringe für Tastatur-User */
        input:focus-visible,
        select:focus-visible,
        .toggle-btn:focus-visible,
        .btn:focus-visible,
        .swap-btn:focus-visible,
        .geo-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .toggle-group {
            display: flex;
            gap: 0.5rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
            text-align: center;
            outline: none;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .toggle-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.3);
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-card {
            display: none;
        }

        .result-card.visible {
            display: block;
        }

        .verdict {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 0.9rem 0.8rem;
            border-radius: 12px;
            transition: background 0.4s, color 0.4s, box-shadow 0.4s;
        }

        .verdict.level-dry {
            background: rgba(102, 187, 106, 0.2);
            color: var(--dry);
            box-shadow: 0 0 20px rgba(102, 187, 106, 0.15);
        }

        .verdict.level-light {
            background: rgba(255, 193, 7, 0.2);
            color: var(--light-rain);
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.15);
        }

        .verdict.level-moderate {
            background: rgba(255, 152, 0, 0.2);
            color: var(--moderate-rain);
            box-shadow: 0 0 20px rgba(255, 152, 0, 0.15);
        }

        .verdict.level-heavy {
            background: rgba(239, 83, 80, 0.2);
            color: var(--heavy-rain);
            box-shadow: 0 0 20px rgba(239, 83, 80, 0.2);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .sub-verdict {
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }

        .timeline {
            margin: 1rem 0;
            position: relative;
            padding: 0.25rem 0;
        }

        .timeline-track {
            position: relative;
            display: flex;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            margin: 1.5rem 0 0.25rem 0;
            overflow: hidden;
        }

        .timeline-segment {
            flex: 1;
            height: 100%;
            transition: background 0.4s ease;
        }

        .timeline-segment:first-child {
            border-radius: 3px 0 0 3px;
        }

        .timeline-segment:last-child {
            border-radius: 0 3px 3px 0;
        }

        .timeline-points {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: -12px;
        }

        .timeline-point {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            flex: 1;
        }

        .point-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: #1a237e;
            transition: all 0.4s ease;
            z-index: 2;
        }

        .point-dot.dry {
            border-color: var(--dry);
            background: var(--dry);
        }

        .point-dot.light {
            border-color: var(--light-rain);
            background: var(--light-rain);
            box-shadow: 0 0 10px rgba(255, 193, 7, 0.4);
        }

        .point-dot.moderate {
            border-color: var(--moderate-rain);
            background: var(--moderate-rain);

        }

        .point-dot.heavy {

        /* ========== ⏰ Optimaler Startzeitpunkt – Abfahrts-Slot-Planer ========== */
        .slot-section {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);

            transform: translateY(-2px);

        /* Farbcodierung der Slots – abgestimmt auf Anforderung */
        .slot-item.level-dry {
            background: rgba(40, 167, 69, 0.15);

        /* ========== Scroll-to-Top Button ========== */
        .scroll-top-btn {
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: #fff;
            font-size: 1.5rem;
            border: none;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 16px rgba(66, 165, 245, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.85);
            transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.25s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            outline: none;
            border: 2px solid rgba(255, 255, 255, 0.25);

        .scroll-top-btn.visible {

            transform: translateY(0) scale(1);

        .scroll-top-btn:active {

            box-shadow: 0 2px 8px rgba(66, 165, 245, 0.4);

<body>
    <div class="app-container">
        <h1>🌤️ Bleibe ich trocken?</h1>
        <p class="subtitle">Finde heraus, ob dich unterwegs Regen erwischt</p>

        <!-- Eingabe -->
        <div class="card" role="search" aria-label="Wetter-Check-Formular">
            <div class="form-group">
                <label for="start">Startort</label>
                <div class="autocomplete-wrapper" role="combobox" aria-expanded="false" aria-haspopup="listbox">
                    <input type="text" id="start" placeholder="z. B. Berlin Hauptbahnhof" value="Berlin Hauptbahnhof" autocomplete="off" aria-autocomplete="list" aria-controls="startSuggestions" aria-expanded="false" />
                    <button type="button" id="geoBtn" class="geo-btn" title="Aktuellen Standort verwenden" aria-label="Aktuellen Standort ermitteln">📍</button>
                    <div class="suggestions-dropdown" id="startSuggestions" role="listbox" aria-label="Adressvorschläge"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="ziel">Zielort</label>
                <div class="autocomplete-wrapper" role="combobox" aria-expanded="false" aria-haspopup="listbox">
                    <input type="text" id="ziel" placeholder="z. B. Brandenburger Tor" value="Brandenburger Tor, Berlin" autocomplete="off" aria-autocomplete="list" aria-controls="zielSuggestions" aria-expanded="false" />
                    <button type="button" id="swapBtn" class="swap-btn" title="Start und Ziel tauschen" aria-label="Start und Ziel tauschen">⇄</button>
                    <div class="suggestions-dropdown" id="zielSuggestions" role="listbox" aria-label="Adressvorschläge"></div>
                </div>
            </div>
            <div class="form-group" role="radiogroup" aria-label="Verkehrsmittel auswählen">
                <label>Verkehrsmittel</label>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn active" data-mode="walking" data-speed="5" role="radio" aria-checked="true" tabindex="0">
                        🚶 Gehen (ca. 5 km/h)
                    </button>
                    <button type="button" class="toggle-btn" data-mode="bicycle" data-speed="15" role="radio" aria-checked="false" tabindex="-1">
                        🚴 Fahrrad (ca. 15 km/h)
                    </button>
                </div>
            </div>
            <div class="error-msg" id="errorMsg" role="alert" aria-live="polite"></div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-text">Berechne Route und checke Wetter...</div>
        </div>

        <!-- Ergebnis -->
        <div class="card result-card" id="resultCard" aria-live="polite" aria-atomic="true">
            <div class="verdict" id="verdict" role="alert"></div>
            <div class="sub-verdict" id="subVerdict"></div>

            <div class="timeline" aria-label="Regen-Vorhersage entlang der Route">
                <div class="timeline-track" aria-hidden="true" id="timelineTrack">
                </div>
                <div class="timeline-points" id="timelinePoints" role="list"></div>
            </div>

            <div class="details-grid" id="detailsGrid"></div>

            <div class="slot-section" id="slotSection">
                <div class="slot-section-title">⏰ Optimaler Startzeitpunkt – Abfahrts-Slot-Planer</div>
                <div class="slot-timeline" id="slotTimeline" role="list" aria-label="Abfahrts-Slot-Auswahl"></div>
                <div class="slot-recommendation" id="slotRecommendation" aria-live="polite"></div>
            </div>

            <div class="wind-section" id="windSection" style="display:none;">
                <div class="wind-header">
                    <span>Fahrrad-Komfort-Index</span>
                </div>
                <div class="wind-icon-wrap" id="windIconWrap">
                    <span class="wind-icon" id="windCyclistEmoji">🚴</span>
                    <span class="wind-arrow-emoji" id="windArrowEmoji"></span>
                    <span class="wind-feedback" id="windFeedback"></span>
                </div>
                <div class="wind-meta" id="windMeta"></div>
                <div class="wind-duration-note" id="windDurationNote"></div>
            </div>

            <div class="bonus-section" id="bonusSection" style="display:none;">
                <div class="bonus-header">🌟 Dein Bonus für heute</div>
                <div class="bonus-content" id="bonusContent"></div>
                <div class="bonus-stats" id="bonusStats"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // App: "Bleibe ich trocken?" – Single-Page-Anwendung
        // ============================================================

        const DOM = {
            start: document.getElementById('start'),
            ziel: document.getElementById('ziel'),
            loading: document.getElementById('loading'),
            resultCard: document.getElementById('resultCard'),
            verdict: document.getElementById('verdict'),
            subVerdict: document.getElementById('subVerdict'),
            timelinePoints: document.getElementById('timelinePoints'),
            timelineTrack: document.getElementById('timelineTrack'),
            detailsGrid: document.getElementById('detailsGrid'),
            errorMsg: document.getElementById('errorMsg'),
            toggleBtns: document.querySelectorAll('.toggle-btn'),
            startSuggestions: document.getElementById('startSuggestions'),
            zielSuggestions: document.getElementById('zielSuggestions'),
            slotSection: document.getElementById('slotSection'),
            slotTimeline: document.getElementById('slotTimeline'),
            slotRecommendation: document.getElementById('slotRecommendation'),
            selectedSlotIndex: null, // aktuell ausgewählter Slot-Index
            windSection: document.getElementById('windSection'),
            windFeedback: document.getElementById('windFeedback'),
            windMeta: document.getElementById('windMeta'),
            windDurationNote: document.getElementById('windDurationNote'),
            bonusSection: document.getElementById('bonusSection'),
            bonusContent: document.getElementById('bonusContent'),
            bonusStats: document.getElementById('bonusStats'),
            _slotClickActive: false, // Flag für Slot-Klick-Trigger
        };

        // Globale Variable: aktuell gewähltes Verkehrsmittel
        let currentMode = 'walking';
        let currentSpeed = 5;

        // AbortController für abgebrochene API-Requests
        let activeController = null;

        // ============================================================
        // Globale Slot-Daten für dynamische Aktualisierung beim Klick
        // ============================================================
        let storedSlotData = {
            slotResults: null,
            bestSlot: null,
            distKm: null,
            totalMinutes: null,
            mode: null,
            startGeo: null,
            zielGeo: null,
            windAnalysis: null,
        };

        // ============================================================
        // 1. Geocoding via Nominatim + Cache
        // ============================================================

        // Cache-Objekt: Speichert bereits abgefragte Adressen (Key = normalisierte Adresse)
        const geocodeCache = {};

        /**
         * Normalisiert einen Adress-String für den Cache-Key:
         *  - trim
         *  - Kleinschreibung
         *  - reduziert überflüssige Leerzeichen
         */
        function normalizeAddress(address) {
            return address.trim().toLowerCase().replace(/\s+/g, ' ');
        }

        async function geocode(address, signal) {
            const key = normalizeAddress(address);

            // 1. Cache-Check: sofort zurückgeben, falls bereits vorhanden
            if (geocodeCache[key]) {
                return geocodeCache[key];
            }

            // 2. Netzwerk-Anfrage (nur bei Cache-Miss)
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
            const resp = await fetch(url, {
                headers: { 'User-Agent': 'BleibeIchTrocken/1.0' },
                signal,
            });
            if (!resp.ok) throw new Error(`Nominatim-Fehler: ${resp.status}`);
            const data = await resp.json();
            if (!data.length) throw new Error(`Konnte "${address}" nicht finden.`);

            const result = {
                lat: parseFloat(data[0].lat),
                lon: parseFloat(data[0].lon),
                displayName: data[0].display_name,
            };

            // 3. Ergebnis ins Cache speichern
            geocodeCache[key] = result;

            return result;
        }

        // ============================================================
        // 2. Open-Meteo Wetter + Wind-Daten
        // ============================================================
        async function fetchWeather(lat, lon, signal) {
            const params = new URLSearchParams({
                latitude: lat,
                longitude: lon,
                hourly: 'precipitation_probability,precipitation,wind_speed_10m,wind_direction_10m',
                timezone: 'auto',
                forecast_days: 2,
            });

            const url = `https://api.open-meteo.com/v1/forecast?${params}`;
            const resp = await fetch(url, { signal });
            if (!resp.ok) throw new Error(`Open-Meteo-Fehler: ${resp.status}`);
            const data = await resp.json();

            return {
                times: data.hourly.time,
                precipProb: data.hourly.precipitation_probability || [],
                precip: data.hourly.precipitation || [],
                windSpeed: data.hourly.wind_speed_10m || [],
                windDirection: data.hourly.wind_direction_10m || [],
            };
        }

        // Wetter für eine bestimmte Zielzeit aus dem gecachten hourly-Array abrufen
        function getWeatherAtTime(weatherData, targetDate) {
            const times = weatherData.times;
            let bestIdx = 0;
            let bestDiff = Infinity;
            for (let i = 0; i < times.length; i++) {
                const t = new Date(times[i]);
                const diff = Math.abs(t - targetDate);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    bestIdx = i;
                }
            }
            // Präzise: undefined/NULL nicht als 0 interpretieren
            const rawPercip = weatherData.precip[bestIdx];
            const mm = (rawPercip === null || rawPercip === undefined) ? 0 : rawPercip;
            const rawProb = weatherData.precipProb[bestIdx];
            const prob = (rawProb === null || rawProb === undefined) ? 0 : rawProb;
            const rawWindSpeed = weatherData.windSpeed[bestIdx];
            const wind_speed = (rawWindSpeed === null || rawWindSpeed === undefined) ? 0 : rawWindSpeed;
            const rawWindDir = weatherData.windDirection[bestIdx];
            const wind_direction = (rawWindDir === null || rawWindDir === undefined) ? 0 : rawWindDir;
            return {
                time: times[bestIdx],
                precipitation_probability: prob,
                precipitation: mm,
                willRain: mm > 0,
                wind_speed,
                wind_direction,
            };
        }

        // ============================================================
        // 2c. Bearing (Fahrtrichtung) berechnen
        // ============================================================
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = (deg) => deg * Math.PI / 180;
            const toDeg = (rad) => rad * 180 / Math.PI;

            const φ1 = toRad(lat1);
            const φ2 = toRad(lat2);
            const λ1 = toRad(lon1);
            const λ2 = toRad(lon2);

            const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                      Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
            const bearing = toDeg(Math.atan2(y, x));
            return (bearing + 360) % 360; // 0-360°
        }

        // ============================================================
        // 2d. Fahrrad-Komfort-Index (Wind-Analyse)
        // ============================================================
        function analyzeWind(bearing, windSpeed, windDirection, mode) {
            // Nur für Fahrrad relevant
            if (mode !== 'bicycle') {
                return { show: false };
            }

            if (!windSpeed || windSpeed < 0.5) {
                return {
                    show: true,
                    type: 'calm',
                    label: 'Windstill',
                    icon: '🍃',
                    message: 'Kein nennenswerter Wind – ideale Fahrradbedingungen.',
                    speed: 0,
                    durationFactor: 1.0,
                };
            }

            // Differenz zwischen Windrichtung und Fahrtrichtung normalisieren (0-180°)
            let diff = Math.abs(windDirection - bearing);
            if (diff > 180) diff = 360 - diff;

            let type, label, icon, message, durationFactor;

            // Gegenwind: Differenz nahe 180°
            if (diff >= 135) {
                type = 'headwind';
                label = 'Gegenwind';
                icon = '🌬️⬆️';
                if (windSpeed >= 20) {
                    message = 'Vorsicht: Starker Gegenwind! Du wirst länger brauchen.';
                    durationFactor = 1.0 + Math.min(0.20, windSpeed / 100); // 10-20% mehr
                } else if (windSpeed >= 10) {
                    message = 'Mäßiger Gegenwind – etwas mehr Kraft nötig.';
                    durationFactor = 1.0 + Math.min(0.10, windSpeed / 150);
                } else {
                    message = 'Leichter Gegenwind – kaum spürbar.';
                    durationFactor = 1.02;
                }
            }
            // Rückenwind: Differenz nahe 0°
            else if (diff <= 45) {
                type = 'tailwind';
                label = 'Rückenwind';
                icon = '🌬️⬇️';
                if (windSpeed >= 20) {
                    message = 'Super: Rückenwind schiebt dich an!';
                    durationFactor = 1.0 - Math.min(0.15, windSpeed / 150);
                } else if (windSpeed >= 10) {
                    message = 'Guter Rückenwind – du rollst leichter.';
                    durationFactor = 1.0 - Math.min(0.08, windSpeed / 200);
                } else {
                    message = 'Leichter Rückenwind – kleiner Schub.';
                    durationFactor = 0.98;
                }
            }
            // Seitenwind: Differenz ~90°
            else {
                type = 'crosswind';
                label = 'Seitenwind';
                icon = '🌬️➡️';
                if (windSpeed >= 20) {
                    message = 'Achtung: Böiger Seitenwind, fahre vorsichtig.';
                } else if (windSpeed >= 10) {
                    message = 'Spürbarer Seitenwind – etwas Konzentration nötig.';
                } else {
                    message = 'Leichter Seitenwind – kaum störend.';
                }
                durationFactor = 1.0; // Seitenwind ändert Dauer kaum
            }

            return {
                show: true,
                type,
                label,
                icon,
                message,
                speed: windSpeed,
                bearing: Math.round(bearing),
                windDirection: Math.round(windDirection),
                diff: Math.round(diff),
                durationFactor,
            };
        }

        // ============================================================
        // 2e. Bonus-Berechnung (CO₂-Ersparnis & Kalorien)
        // ============================================================
        function calculateBonus(distKm, totalMinutes, mode) {
            const CO2_PER_KM = 150; // g CO2 pro km (PKW)
            const kcalFactors = { walking: 4, bicycle: 8 }; // kcal pro Minute

            const co2Kg = (distKm * CO2_PER_KM) / 1000;
            const kcal = Math.round(totalMinutes * (kcalFactors[mode] || 4));

            return { co2Kg, kcal };
        }

        // ============================================================
        // 6d. Bonus-Bereich rendern (Motivation)
        // ============================================================
        function renderBonus(distKm, totalMinutes, mode, weatherResults) {

            `;

            // Stat-Kacheln
            statsEl.innerHTML = `

                </div>
                <div class="bonus-stat">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value">${bonus.kcal.toLocaleString('de-DE')}</div>
                    <div class="stat-label">Kalorien</div>
                </div>
                <div class="bonus-stat">
                    <div class="stat-icon">${modeEmoji}</div>
                    <div class="stat-value">${formatDuration(totalMinutes)}</div>
