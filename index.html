                </div>
            `;
        }
        function getWeatherAdvice(mm) {
            if (mm === 0 || mm === null || mm === undefined) {
                return {
                    level: 'dry',
                    label: 'Trocken',
                    icon: '🟢',
                    message: 'Du bleibst trocken!',
                };
            }
            if (mm <= 0.5) {
                return {
                    level: 'light',
                    label: 'Leichter Regen',
                    icon: '🟡',
                    message: 'Nur leichter Nieselregen – eine Kapuze reicht.',
                };
            }
            if (mm <= 2.0) {
                return {
                    level: 'moderate',
                    label: 'Mäßiger Regen',
                    icon: '🟠',
                    message: 'Es regnet – nimm einen Regenschirm oder Regenjacke mit.',
                };
            }
            // > 2.0 mm
            return {
                level: 'heavy',
                label: 'Starkregen',
                icon: '🔴',
                message: 'Starkregen-Warnung! Such dir lieber einen Unterstand oder warte ab.',
            };
        }

        // ============================================================
        // 3. Route interpolieren
        // ============================================================
        function interpolatePoints(startLat, startLon, endLat, endLon, numPoints = 3) {
            const points = [];
            for (let i = 0; i < numPoints; i++) {
                const fraction = i / (numPoints - 1);
                points.push({
                    lat: startLat + (endLat - startLat) * fraction,
                    lon: startLon + (endLon - startLon) * fraction,
                    label: i === 0 ? 'Start' : (i === numPoints - 1 ? 'Ziel' : `Punkt ${i + 1}`),
                });
            }
            // Benenne den mittleren Punkt um
            if (numPoints === 3) {
                points[1].label = 'Mitte';
            } else if (numPoints > 2) {
                const mid = Math.floor(numPoints / 2);
                points[mid].label = 'Mitte';
            }
            return points;
        }

        // ============================================================
        // 4. Geschätzte Dauer berechnen (Luftlinie ~) 
        // ============================================================
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function estimateDuration(distKm, speedKmh) {
            return (distKm / speedKmh) * 3600; // in Sekunden
        }

        // ============================================================
        // 5. Hauptlogik
        // ============================================================
        async function checkWeather() {
            // Vorherige Requests abbrechen
            if (activeController) {
                activeController.abort();
            }
            activeController = new AbortController();
            const signal = activeController.signal;

            const startStr = DOM.start.value.trim();
            const zielStr = DOM.ziel.value.trim();
            const mode = currentMode;

            if (!startStr || !zielStr) {
                showError('Bitte Start- und Zielort eingeben.');
                return;
            }

            // Adressen für den nächsten App-Start speichern
            saveCurrentAddresses();

            hideError();
            DOM.resultCard.classList.remove('visible');
            DOM.loading.classList.add('visible');

            try {
                // 5a. Geocoding
                const [startGeo, zielGeo] = await Promise.all([
                    geocode(startStr, signal),
                    geocode(zielStr, signal),
                ]);

                // 5b. Distanz & Dauer
                const distKm = haversineDistance(startGeo.lat, startGeo.lon, zielGeo.lat, zielGeo.lon);
                const speedKmh = currentSpeed;
                let totalSeconds = estimateDuration(distKm, speedKmh);
                let totalMinutes = totalSeconds / 60;

                // 5b1. Bearing (Fahrtrichtung) berechnen
                const bearing = calculateBearing(startGeo.lat, startGeo.lon, zielGeo.lat, zielGeo.lon);

                // 5c. Checkpunkte (Start, Mitte, Ziel)
                const points = interpolatePoints(startGeo.lat, startGeo.lon, zielGeo.lat, zielGeo.lon, 3);

                // 5d. Wetterdaten für alle 3 Koordinaten laden (einmalig pro Koordinate)
                const [startWeather, midWeather, endWeather] = await Promise.all([
                    fetchWeather(points[0].lat, points[0].lon, signal),
                    fetchWeather(points[1].lat, points[1].lon, signal),
                    fetchWeather(points[2].lat, points[2].lon, signal),
                ]);

                // Wind-Daten aus dem Start-Wetter extrahieren
                const now = new Date();
                const windAtStart = getWeatherAtTime(startWeather, now);
                const windAnalysis = analyzeWind(bearing, windAtStart.wind_speed, windAtStart.wind_direction, mode);

                // 5b3. Dauer bei starkem Wind anpassen
                if (windAnalysis.show && windAnalysis.durationFactor !== 1.0) {
                    totalSeconds = totalSeconds * windAnalysis.durationFactor;
                    totalMinutes = totalSeconds / 60;
                }

                const weatherDataMap = {
                    [points[0].label]: startWeather,
                    [points[1].label]: midWeather,
                    [points[2].label]: endWeather,
                };

                // ============================================================
                // 5e. ⏰ Abfahrts-Slot-Planer: 6 Slots berechnen
                // ============================================================
                const slotResults = calculateDepartureSlots(totalSeconds, now, points, weatherDataMap);

                // 5f. Besten Slot ermitteln (dynamisch nach Trockenheit + Verzögerung)
                const bestSlot = findBestSlot(slotResults);

                // 5g. UI rendern – starte mit dem besten Slot als Hauptansicht
                renderResult(bestSlot.points, bestSlot.worst, distKm, totalMinutes, mode, startGeo, zielGeo, slotResults, bestSlot, windAnalysis);

            } catch (err) {
                // Abgebrochene Requests ignorieren
                if (err.name === 'AbortError') return;
                showError(err.message);
            } finally {
                DOM.loading.classList.remove('visible');
                activeController = null;
            }
        }

        // ============================================================
        // 6. UI Rendering
        // ============================================================
        function renderResult(weatherResults, worstPoint, distKm, totalMinutes, mode, startGeo, zielGeo, slotResults, bestSlot, windAnalysis) {
            const verdictEl = DOM.verdict;
            const subVerdictEl = DOM.subVerdict;
            const timelinePointsEl = DOM.timelinePoints;
            const timelineTrackEl = DOM.timelineTrack;
            const detailsGridEl = DOM.detailsGrid;

            const worstAdvice = worstPoint.advice;

            // Verdict – Farbe + Text basierend auf der höchsten Intensität
            const levelNames = {
                dry: 'level-dry',
                light: 'level-light',
                moderate: 'level-moderate',
                heavy: 'level-heavy',
            };

            verdictEl.textContent = `${worstAdvice.icon} ${worstAdvice.message}`;
            verdictEl.className = `verdict ${levelNames[worstAdvice.level]}`;

            // Sub-Verdict – Details zu den Punkten
            const rainCount = weatherResults.filter(p => p.weather.precipitation > 0).length;
            if (rainCount === 0) {
                subVerdictEl.textContent = 'Kein Regen auf deiner Route vorhergesagt. 🌤️';
            } else {
                const maxMm = Math.max(...weatherResults.map(p => p.weather.precipitation));
                subVerdictEl.textContent = `${worstAdvice.icon} ${worstAdvice.label}: maximal ${maxMm.toFixed(1)} mm – ${rainCount} von ${weatherResults.length} Punkten betroffen.`;
            }

            // Timeline-Punkte
            timelinePointsEl.innerHTML = '';
            weatherResults.forEach((p) => {
                const mm = p.weather.precipitation;
                const prob = p.weather.precipitation_probability;

                let dotClass = 'dry';
                let weatherIcon = '☀️';
                if (mm > 2.0) {
                    dotClass = 'heavy';
                    weatherIcon = '🌧️🔴';
                } else if (mm > 0.5) {
                    dotClass = 'moderate';
                    weatherIcon = '🌧️🟠';
                } else if (mm > 0) {
                    dotClass = 'light';
                    weatherIcon = '🌦️🟡';
                } else if (prob > 30) {
                    weatherIcon = '☁️';
                }

                const timeStr = p.targetTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

                const col = document.createElement('div');
                col.className = 'timeline-point';
                col.innerHTML = `
                    <div class="point-dot ${dotClass}"></div>
                    <div class="point-label">${p.label}</div>
                    <div class="point-time">${timeStr}</div>
                    <div class="point-weather">
                        ${weatherIcon}
                        ${mm > 0 ? `<br>${mm.toFixed(1)} mm` : (prob > 0 ? `<br>${prob}%` : '')}
                    </div>
                `;
                timelinePointsEl.appendChild(col);
            });

            // Timeline-Segmente (Start, Mitte, Ziel) einfärben
            timelineTrackEl.innerHTML = '';
            weatherResults.forEach((p) => {
                const mm = p.weather.precipitation;
                let color = 'var(--dry)';
                if (mm > 2.0) {
                    color = 'var(--heavy-rain)';
                } else if (mm > 0.5) {
                    color = 'var(--moderate-rain)';
                } else if (mm > 0) {
                    color = 'var(--light-rain)';
                }
                const seg = document.createElement('div');
                seg.className = 'timeline-segment';
                seg.style.background = color;
                timelineTrackEl.appendChild(seg);
            });

            // Details
            const modeLabel = mode === 'walking' ? '🚶 Gehen' : '🚴 Fahrrad';
            detailsGridEl.innerHTML = `
                <div class="detail-item">
                    <div class="label">Strecke (Luftlinie)</div>
                    <div class="value">${distKm.toFixed(1)} km</div>
                </div>
                <div class="detail-item">
                    <div class="label">Geschätzte Dauer</div>
                    <div class="value">${formatDuration(totalMinutes)}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Verkehrsmittel</div>
                    <div class="value">${modeLabel}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Start</div>
                    <div class="value" style="font-size:0.85rem;">${startGeo.displayName.split(',')[0]}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Ziel</div>
                    <div class="value" style="font-size:0.85rem;">${zielGeo.displayName.split(',')[0]}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Max. Regen</div>
                    <div class="value">${Math.max(...weatherResults.map(p => p.weather.precipitation)).toFixed(1)} mm</div>
                </div>
            `;

            // ============================================================
            // Slot-Timeline rendern + Slot-Daten global speichern
            // ============================================================
            if (slotResults && bestSlot) {
                // Globale Slot-Daten für spätere Klick-Aktualisierung
                storedSlotData = {
                    slotResults,
                    bestSlot,
                    distKm,
                    totalMinutes,
                    mode,
                    startGeo,
                    zielGeo,
                    windAnalysis,
                };
                renderSlotTimeline(slotResults, bestSlot);
            }

            // ============================================================
            // Wind (Fahrrad-Komfort-Index) rendern
            // ============================================================
            renderWindInfo(windAnalysis, totalMinutes, distKm);

            // ============================================================
            // Bonus (CO₂ & Kalorien) rendern
            // ============================================================
            renderBonus(distKm, totalMinutes, mode, weatherResults);

            DOM.resultCard.classList.add('visible');
            DOM.resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ============================================================
        // 6c. Wind-Info rendern (Fahrrad-Komfort-Index) mit Emoji-Pfeil
        // ============================================================
        function renderWindInfo(wind, totalMinutes, distKm) {
            const section = DOM.windSection;
            const feedbackEl = DOM.windFeedback;
            const metaEl = DOM.windMeta;
            const durationNoteEl = DOM.windDurationNote;
            const arrowEmoji = document.getElementById('windArrowEmoji');
            const iconWrap = document.getElementById('windIconWrap');

            if (!wind || !wind.show) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            section.className = 'wind-section wind-only-bicycle';

            // Feedback-Klasse
            const typeClassMap = {
                tailwind: 'tailwind',
                headwind: 'headwind',
                crosswind: 'crosswind',
                calm: 'calm',
            };
            feedbackEl.className = `wind-feedback ${typeClassMap[wind.type] || 'calm'}`;

            // Angepasste Dauer berechnen (für Anzeige)
            const baseMinutes = estimateDuration(distKm, currentSpeed) / 60;
            const diffMinutes = totalMinutes - baseMinutes;
            const diffSign = diffMinutes >= 0 ? '+' : '';
            const diffStr = Math.abs(diffMinutes) >= 0.5 ? `${diffSign}${Math.round(diffMinutes)} Min.` : '±0 Min.';

            // Emoji-Pfeil je nach Windtyp setzen
            if (wind.type === 'calm') {
                if (arrowEmoji) arrowEmoji.textContent = '🍃';
                if (iconWrap) iconWrap.className = 'wind-icon-wrap';
                feedbackEl.textContent = wind.message;
                metaEl.innerHTML = `
                    <span>🌬️ ${wind.speed.toFixed(0)} km/h</span>
                    <span>🧭 Windstill</span>
                `;
                durationNoteEl.textContent = '';
            } else {
                // Pfeil-Emoji: Fahrradfahrer 🚴 + Pfeil
                // Rückenwind: Wind von hinten → 🚴⬅️
                // Gegenwind: Wind von vorne → ➡️🚴
                // Seitenwind: Wind von der Seite → 🚴⬇️
                const arrowMap = {
                    tailwind: '⬅️',
                    headwind: '➡️',
                    crosswind: '⬇️',
                };
                if (arrowEmoji) arrowEmoji.textContent = arrowMap[wind.type] || '🌬️';

                // Reihenfolge steuern: order: 2 = hinten (Standard), order: 1 = vorne
                const cyclistEmoji = document.getElementById('windCyclistEmoji');
                if (arrowEmoji && cyclistEmoji) {
                    if (wind.type === 'headwind') {
                        // ➡️🚴 – Pfeil zuerst (order 1), Radfahrer danach (order 2)
                        arrowEmoji.style.order = '1';
                        cyclistEmoji.style.order = '2';
                    } else {
                        // 🚴⬅️ / 🚴⬇️ – Radfahrer zuerst (order 1), Pfeil danach (order 2)
                        arrowEmoji.style.order = '2';
                        cyclistEmoji.style.order = '1';
                    }
                }

                feedbackEl.textContent = wind.message;
                metaEl.innerHTML = `
                    <span>🌬️ ${wind.speed.toFixed(0)} km/h</span>
                    <span>🧭 Wind: ${wind.windDirection}°</span>
                    <span>📍 Fahrt: ${wind.bearing}°</span>
                    <span>📐 Diff: ${wind.diff}°</span>
                `;
                if (wind.durationFactor !== 1.0) {
                    const pct = Math.round((wind.durationFactor - 1) * 100);
                    const pctSign = pct >= 0 ? '+' : '';
                    durationNoteEl.textContent = `⏱️ Dauer angepasst: ${pctSign}${pct}% (${diffStr})`;
                } else {
                    durationNoteEl.textContent = '⏱️ Keine Dauer-Anpassung durch Wind.';
                }
            }
        }

        // ============================================================
        // 5e. calculateDepartureSlots – berechnet 6 Abfahrts-Slots
        // ============================================================
        /**
         * Berechnet für 6 Zeitfenster (jetzt, +15min, +30min, +45min, +60min, +90min)
         * die Wetterbedingungen entlang der Route.
         * @param {number} totalSeconds – Geschätzte Routendauer in Sekunden
         * @param {Date} now – Aktueller Zeitpunkt
         * @param {Array} points – Routenpunkte [{lat, lon, label}]
         * @param {Object} weatherDataMap – Gemappte Wetterdaten je Punktlabel
         * @returns {Array} – Array von Slot-Objekten
         */
        function calculateDepartureSlots(totalSeconds, now, points, weatherDataMap) {
            // 4 Slots: +0min, +15min, +30min, +45min
            const slotOffsets = [0, 15, 30, 45];
            const slotLabels = ['Jetzt', '+15 Min.', '+30 Min.', '+45 Min.'];

            const levelRank = { dry: 0, light: 1, moderate: 2, heavy: 3 };

            return slotOffsets.map((offsetMin, idx) => {
                const startTime = new Date(now.getTime() + offsetMin * 60 * 1000);

                // Für jeden Routenpunkt die Wettervorhersage zum Ankunftszeitpunkt simulieren
                const pointResults = points.map((p) => {
                    // Fraction der Route (Start=0, Mitte~0.5, Ziel=1)
                    const fraction = p.label === 'Start' ? 0 : (p.label === 'Ziel' ? 1 : 0.5);
                    const offsetMs = totalSeconds * fraction * 1000;
                    const targetTime = new Date(startTime.getTime() + offsetMs);
                    const weather = getWeatherAtTime(weatherDataMap[p.label], targetTime);
                    const advice = getWeatherAdvice(weather.precipitation);
                    return { ...p, targetTime, weather, advice };
                });

                // Höchste Regen-Intensität auf der Route für diesen Slot
                const worst = pointResults.reduce((w, c) =>
                    levelRank[c.advice.level] > levelRank[w.advice.level] ? c : w
                , pointResults[0]);

                // Maximaler mm-Wert auf der Route
                const maxMm = Math.max(...pointResults.map(r => r.weather.precipitation));

                // Gesamte Niederschlagsmenge (Summe) über alle Punkte für besseres Ranking
                const totalMm = pointResults.reduce((sum, r) => sum + r.weather.precipitation, 0);

                // Trockene-Punkte-Anteil (0–1)
                const dryPoints = pointResults.filter(r => r.weather.precipitation === 0).length;
                const dryRatio = dryPoints / pointResults.length;

                return {
                    slotIndex: idx,
                    label: slotLabels[idx],
                    offsetMinutes: offsetMin,
                    startTime,
                    points: pointResults,
                    worst,
                    maxMm,
                    totalMm,
                    dryRatio,
                };
            });
        }

        // ============================================================
        // 5f. findBestSlot – findet den optimalen Startzeitpunkt
        // ============================================================
        /**
         * Ermittelt den besten Slot nach einem gewichteten Score:
         * - Hauptkriterium: Kein Regen (dry) > leicht > mäßig > stark
         * - Sekundär: Geringste Niederschlagsmenge
         * - Tertiär: Geringste Verzögerung (bei Gleichstand)
         * @param {Array} slotResults – Ergebnis von calculateDepartureSlots
         * @returns {Object} – Der beste Slot
         */
        function findBestSlot(slotResults) {
            const levelRank = { dry: 0, light: 1, moderate: 2, heavy: 3 };

            // Explizite Sortierung statt Weighted Score (robuster):
            // 1. Hauptkriterium: Level-Ranking (dry > light > moderate > heavy)
            // 2. Sekundär: Niederschlagsmenge (maxMm, je weniger desto besser)
            // 3. Tertiär: Verzögerung (offsetMinutes, je weniger desto besser)
            return slotResults.reduce((best, slot) => {
                const bestLevel = levelRank[best.worst.advice.level] ?? 3;
                const slotLevel = levelRank[slot.worst.advice.level] ?? 3;

                // Level-Vergleich
                if (slotLevel < bestLevel) return slot;           // besserer Level
                if (slotLevel > bestLevel) return best;           // schlechterer Level

                // Gleicher Level → Niederschlagsmenge vergleichen
                if (slot.maxMm < best.maxMm) return slot;
                if (slot.maxMm > best.maxMm) return best;

                // Gleiche Niederschlagsmenge → Verzögerung vergleichen
                if (slot.offsetMinutes < best.offsetMinutes) return slot;

                return best;
            });
        }

        // ============================================================
        // 6b. Abfahrts-Slot-Planer rendern (interaktiv + farbcodiert)
        // ============================================================
        function renderSlotTimeline(slotResults, bestSlot) {
            const container = DOM.slotTimeline;
            const recEl = DOM.slotRecommendation;
            container.innerHTML = '';
            
            // Zurücksetzen des aktiven Slots bei neuem Rendern
            DOM.selectedSlotIndex = null;

            const levelRank = { dry: 0, light: 1, moderate: 2, heavy: 3 };

            slotResults.forEach((slot) => {
                const isBest = slot.slotIndex === bestSlot.slotIndex;
                const worstLevel = slot.worst.advice.level;

                // Level-Klasse für Farbcodierung (CSS-Variablen)
                let levelClass = 'level-dry';
                if (worstLevel === 'light') levelClass = 'level-light';
                else if (worstLevel === 'moderate') levelClass = 'level-moderate';
                else if (worstLevel === 'heavy') levelClass = 'level-heavy';

                // Farb-Kreise gemäß Anforderung: GRÜN/GELB/ROT
                let emoji = '🟢';
                let iconColor = '#28a745';
                if (worstLevel === 'light') { emoji = '🟡'; iconColor = '#ffc107'; }
                else if (worstLevel === 'moderate') { emoji = '🟠'; iconColor = '#ff9800'; }
                else if (worstLevel === 'heavy') { emoji = '🔴'; iconColor = '#dc3545'; }

                // Beschreibung
                let desc = slot.worst.advice.label;
                if (slot.maxMm > 0) desc += ` · ${slot.maxMm.toFixed(1)} mm`;

                // Uhrzeit formatieren
                const timeStr = slot.startTime.toLocaleTimeString('de-DE', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                // Offset-Text (nur bei > 0)
                const offsetText = slot.offsetMinutes > 0
                    ? (slot.offsetMinutes < 60
                        ? `+${slot.offsetMinutes} Min.`
                        : `+${(slot.offsetMinutes / 60).toFixed(0)} Std.`)
                    : '';

                const div = document.createElement('div');
                div.className = `slot-item ${levelClass}${isBest ? ' slot-best' : ''}`;
                div.setAttribute('role', 'option');
                div.setAttribute('tabindex', '0');
                div.setAttribute('aria-label', `${timeStr} – ${slot.worst.advice.label}, max. ${slot.maxMm.toFixed(1)} mm Niederschlag`);
                div.dataset.slotIndex = slot.slotIndex;
                
                div.innerHTML = `
                    <div class="slot-time">${timeStr}</div>
                    <div class="slot-label">${slot.label}</div>
                    <span class="slot-icon">${emoji}</span>
                    <div class="slot-desc">${desc}</div>
                    <div class="slot-offset">${offsetText}</div>
                    ${isBest ? '<span class="slot-badge">⭐</span>' : ''}
                `;

                // Klick-Event: Slot auswählen → aktualisiert Verdict, Timeline, Details, Wind, Bonus
                div.addEventListener('click', () => {
                    const clickedSlot = slotResults.find(s => s.slotIndex === slot.slotIndex);
                    if (!clickedSlot) return;
                    DOM._slotClickActive = true;
                    setActiveSlot(slot.slotIndex, slotResults, bestSlot);
                    // Haupt-Ansicht auf diesen Slot aktualisieren
                    if (storedSlotData.distKm !== null) {
                        const d = storedSlotData;
                        renderResult(clickedSlot.points, clickedSlot.worst, d.distKm, d.totalMinutes, d.mode, d.startGeo, d.zielGeo, d.slotResults, d.bestSlot, d.windAnalysis);
                    }
                    // Recommendation-Text nach dem Rendern setzen (vom Klick-Handler, nicht überschreiben)
                    DOM.slotRecommendation.textContent = generateSlotComparisonText(
                        clickedSlot, bestSlot, slotResults
                    );
                    DOM._slotClickActive = false;
                });
                div.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        const clickedSlot = slotResults.find(s => s.slotIndex === slot.slotIndex);
                        if (!clickedSlot) return;
                        DOM._slotClickActive = true;
                        setActiveSlot(slot.slotIndex, slotResults, bestSlot);
                        if (storedSlotData.distKm !== null) {
                            const d = storedSlotData;
                            renderResult(clickedSlot.points, clickedSlot.worst, d.distKm, d.totalMinutes, d.mode, d.startGeo, d.zielGeo, d.slotResults, d.bestSlot, d.windAnalysis);
                        }
                        DOM.slotRecommendation.textContent = generateSlotComparisonText(
                            clickedSlot, bestSlot, slotResults
                        );
                        DOM._slotClickActive = false;
                    }
                });

                container.appendChild(div);
            });

            // ============================================================
            // Setze den Standard-Active-Slot auf den besten Slot (visuelle Markierung)
            // ============================================================
            if (bestSlot) {
                setActiveSlot(bestSlot.slotIndex, slotResults, bestSlot);
            }

            // ============================================================
            // Generiere den dynamischen Empfehlungstext (initial für Best-Slot)
            // Nur setzen, wenn kein aktiver Slot-Klick gerade läuft (sonst überschreiben)
            // ============================================================
            if (!DOM._slotClickActive && recEl) {
                recEl.textContent = generateSlotRecommendation(slotResults, bestSlot);
            }
        }

        // ============================================================
        // generateSlotRecommendation – intelligenter Text-Tipp
        // ============================================================
        /**
         * Generiert einen dynamischen Klartext-Tipp, der alle 6 Slots vergleicht.
         * @param {Array} slotResults – alle Slot-Objekte
         * @param {Object} bestSlot – der beste Slot laut findBestSlot
         * @returns {string} – Empfehlungstext
         */
        function generateSlotRecommendation(slotResults, bestSlot) {
            if (!slotResults || slotResults.length === 0) return '';

            const best = bestSlot || slotResults[0];
            const nowSlot = slotResults[0];
            const bestLevel = best.worst.advice.level;
            const nowLevel = nowSlot.worst.advice.level;
            const bestTime = best.startTime.toLocaleTimeString('de-DE', {
                hour: '2-digit', minute: '2-digit'
            });

            // ============================================================
            // Logik 1: Alle Slots trocken → "Perfektes Timing"
            // ============================================================
            const allDry = slotResults.every(s => s.worst.advice.level === 'dry');
            if (allDry) {
                return '☀️ Perfektes Timing: Egal wann du losgehst, du bleibst in den nächsten 45 Minuten trocken.';
            }

            // ============================================================
            // Logik 2: Regen wird zunehmend schlimmer → "Beeilung!"
            // ============================================================
            const isWorsening = (() => {
                let lastScore = -1;
                const levelScore = { dry: 0, light: 1, moderate: 2, heavy: 3 };
                for (const s of slotResults) {
                    const sc = levelScore[s.worst.advice.level] || 3;
                    if (sc < lastScore) return false; // zwischendrin besser → kein klarer Trend
                    lastScore = sc;
                }
                // Prüfen: mindestens eine Verschlechterung
                const first = levelScore[slotResults[0].worst.advice.level] || 3;
                const last = levelScore[slotResults[slotResults.length - 1].worst.advice.level] || 3;
                return last > first;
            })();

            if (isWorsening) {
                // Zusätzlich prüfen, ob der Niederschlag absolut zunimmt
                const firstMm = slotResults[0].maxMm;
                const lastMm = slotResults[slotResults.length - 1].maxMm;
                if (lastMm > firstMm && firstMm > 0) {
                    return `🏃‍♂️ Beeilung! Geh am besten sofort los. In den nächsten Slots nimmt der Regen stark zu (${firstMm.toFixed(1)} mm → ${lastMm.toFixed(1)} mm).`;
                }
            }

            // ============================================================
            // Logik 3: Aktueller Slot hat Regen, aber +15 Min ist trocken
            // ============================================================
            if (nowLevel !== 'dry' && bestLevel === 'dry') {
                const diffMin = best.offsetMinutes;
                if (diffMin <= 15) {
                    return `💡 Tipp: Warte noch ${diffMin} Minute${diffMin !== 1 ? 'n' : ''}. Wenn du um ${bestTime} losgehst, bleibt es auf der gesamten Route trocken!`;
                } else if (diffMin <= 30) {
                    return `💡 Tipp: Starte um ${bestTime} – dann bleibst du garantiert trocken! Nur ${diffMin} Minuten später.`;
                } else if (diffMin <= 60) {
                    return `💡 Tipp: In einer Stunde (${bestTime}) ist die Regenfront durch – dann wird's trocken.`;
                } else {
                    return `💡 Tipp: Ab ${bestTime} beruhigt sich das Wetter – beste Chance auf eine trockene Route.`;
                }
            }

            // ============================================================
            // Fallback: Standard-Empfehlung
            // ============================================================
            if (bestLevel === 'dry') {
                if (best.slotIndex === 0) {
                    return '✅ Perfekt! Du kannst jetzt sofort los – die gesamte Route bleibt trocken.';
                }
                return `✅ Optimal: ${bestTime} – du bleibst trocken bei minimaler Verzögerung.`;
            }

            if (bestLevel === 'light') {
                return `⭐ Beste Wahl: ${bestTime} – nur leichter Niesel mit ${best.maxMm.toFixed(1)} mm.`;
            }

            // Überall Regen
            return `⭐ Beste Wahl: ${bestTime} mit ${best.worst.advice.label} (${best.maxMm.toFixed(1)} mm) – geringster Niederschlag im Vergleich.`;
        }

        // ============================================================
        // generateSlotComparisonText – Vergleich zweier Slots
        // ============================================================
        /**
         * Generiert einen Vergleichstext zwischen einem aktiven Slot und dem besten Slot.
         * @param {Object} activeSlot – Der aktuell ausgewählte Slot
         * @param {Object} bestSlot – Der global beste Slot
         * @param {Array} slotResults – alle Slot-Ergebnisse (für Fallback)
         * @returns {string} – formatierter Vergleichstext
         */
        function generateSlotComparisonText(activeSlot, bestSlot, slotResults) {
            if (!activeSlot || !bestSlot) return '';

            const best = bestSlot;
            const activeLevel = activeSlot.worst.advice.level;
            const bestLevel = best.worst.advice.level;
            const activeMm = activeSlot.maxMm;
            const bestMm = best.maxMm;

            // Falls der aktive Slot bereits der beste ist → generelle Empfehlung
            if (activeSlot.slotIndex === best.slotIndex) {
                return generateSlotRecommendation(slotResults, bestSlot);
            }

            const activeTime = activeSlot.startTime.toLocaleTimeString('de-DE', {
                hour: '2-digit', minute: '2-digit'
            });
            const bestTime = best.startTime.toLocaleTimeString('de-DE', {
                hour: '2-digit', minute: '2-digit'
            });

            // Vergleich der Intensitäts-Level
            const levels = { dry: 0, light: 1, moderate: 2, heavy: 3 };
            const a = levels[activeLevel] || 3;
            const b = levels[bestLevel] || 3;
            let levelCompare = '';
            if (a > b) levelCompare = `⛔ ${activeLevel} ist schlechter als ${bestLevel}`;
            else if (a < b) levelCompare = `✅ ${activeLevel} ist besser als ${bestLevel}`;
            else levelCompare = `➡️ Beide ${activeLevel}`;

            // Extra-Warnung wenn möglich
            let extraNote = '';
            if (a > b && activeLevel !== 'dry') {
                const diffMm = (activeMm - bestMm).toFixed(1);
                if (diffMm > 0) {
                    extraNote = ` (${diffMm} mm mehr Niederschlag)`;
                }
            }

            return `👆 Aktuell: ${activeTime} – ${activeLevel}${activeMm > 0 ? ` (${activeMm.toFixed(1)} mm)` : ''}. ${levelCompare}${extraNote}. ⭐ Empfohlen: ${bestTime} (${bestLevel}${bestMm > 0 ? `, ${bestMm.toFixed(1)} mm` : ''}).`;
        }

        /**
         * Setzt einen Slot als aktiv (markiert ihn mit Border/Hervorhebung).
         * @param {number} slotIndex – Index des aktiven Slots
         * @param {Array} slotResults – alle Slot-Daten
         * @param {Object} bestSlot – der globale beste Slot
         */
        function setActiveSlot(slotIndex, slotResults, bestSlot) {
            // Vorherige Auswahl entfernen
            document.querySelectorAll('.slot-item.slot-active').forEach(el => {
                el.classList.remove('slot-active');
            });

            // Neuen Slot markieren
            const items = document.querySelectorAll('.slot-item');
            items.forEach((el) => {
                if (parseInt(el.dataset.slotIndex) === slotIndex) {
                    el.classList.add('slot-active');
                }
            });

            DOM.selectedSlotIndex = slotIndex;
        }

        function formatDuration(totalMinutes) {
            if (totalMinutes < 1) return '< 1 Min.';
            const hrs = Math.floor(totalMinutes / 60);
            const mins = Math.round(totalMinutes % 60);
            if (hrs > 0) {
                return `${hrs}h ${mins}min`;
            }
            return `${mins} Min.`;
        }

        function showError(msg) {
            DOM.errorMsg.textContent = msg;
            DOM.errorMsg.classList.add('visible');
        }

        function hideError() {
            DOM.errorMsg.textContent = '';
            DOM.errorMsg.classList.remove('visible');
        }

        // ============================================================
        // 7. Toggle-Buttons (Radio-Button-Verhalten)
        // ============================================================

        /**
         * Speichert die aktuellen Adressen aus den Eingabefeldern in localStorage.
         * Wird beim Umschalten des Verkehrsmittels und beim Checken aufgerufen.
         */
        function saveCurrentAddresses() {
            const startStr = DOM.start.value.trim();
            const zielStr = DOM.ziel.value.trim();
            if (startStr) localStorage.setItem('startLocation', startStr);
            if (zielStr) localStorage.setItem('zielLocation', zielStr);
        }

        function setMode(btn) {
            // Alle deaktivieren
            DOM.toggleBtns.forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-checked', 'false');
                b.setAttribute('tabindex', '-1');
            });
            // Ausgewählten aktivieren
            btn.classList.add('active');
            btn.setAttribute('aria-checked', 'true');
            btn.setAttribute('tabindex', '0');
            // Globale Variablen setzen
            currentMode = btn.dataset.mode;
            currentSpeed = parseFloat(btn.dataset.speed);

            // Adressen sofort speichern (damit sie auch ohne Check-Klick erhalten bleiben)
            saveCurrentAddresses();
        }

        DOM.toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn);
                checkWeather();
            });
        });

        // Initial: "Gehen" ist standardmäßig aktiv – Klasse ist schon im HTML gesetzt,
        // aber die globalen Variablen müssen initial gesetzt werden.
        (function initMode() {
            const activeBtn = document.querySelector('.toggle-btn.active');
            if (activeBtn) {
                currentMode = activeBtn.dataset.mode;
                currentSpeed = parseFloat(activeBtn.dataset.speed);
            }
        })();

        // ============================================================
        // 7b. Gespeicherte Adressen aus localStorage laden
        // ============================================================
        (function loadSavedLocations() {
            // defaultValues setzen (für Smart Clear)
            DOM.start.defaultValue = DOM.start.value;
            DOM.ziel.defaultValue = DOM.ziel.value;
            const savedStart = localStorage.getItem('startLocation');
            const savedZiel = localStorage.getItem('zielLocation');
            if (savedStart) {
                DOM.start.value = savedStart;
                DOM.start.defaultValue = savedStart;
            }
            if (savedZiel) {
                DOM.ziel.value = savedZiel;
                DOM.ziel.defaultValue = savedZiel;
            }
        })();

        // ============================================================
        // 8. Autocomplete / Suggestions – optimiert (schnell + PLZ)
        // ============================================================

        // Cache für Suggestions – Key = normalisierte Suchanfrage
        const suggestionsCache = {};

        // Smart Clear: Leert das Feld beim ersten Fokus, wenn es den Default-Wert enthält
        function setupSmartClear(inputEl) {
            let firstFocus = true;
            inputEl.addEventListener('focus', function onFocus() {
                if (!firstFocus) return;
                firstFocus = false;
                const val = inputEl.value.trim();
                if (val === inputEl.defaultValue || val === inputEl.placeholder) {
                    inputEl.value = '';
                }
            });
        }

        /**
         * Extrahiert die Postleitzahl aus einem Nominatim-Ergebnis.
         */
        function extractPLZ(item) {
            // Photon: postcode direkt in properties
            if (item.postcode) {
                const m = String(item.postcode).match(/(\d{5})/);
                if (m) return m[1];
            }
            // Nominatim-Kompatibilität: über address-Objekt
            if (item.address && item.address.postcode) {
                const m = item.address.postcode.match(/(\d{5})/);
                if (m) return m[1];
            }
            if (item.display_name) {
                const m = item.display_name.match(/\b(\d{5})\b/);
                if (m) return m[1];
            }
            return null;
        }

        async function fetchSuggestions(query, signal) {
            if (query.length < 1) return [];
            const cacheKey = query.trim().toLowerCase();
            if (suggestionsCache[cacheKey]) return suggestionsCache[cacheKey];

            // Photon (komoot) Autocomplete – besseres Prefix-Matching als Nominatim
            const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=20&lang=de`;
            const resp = await fetch(url, { signal });
            if (!resp.ok) return [];
            const data = await resp.json();
            const features = data.features || [];
            // In ein einheitliches Format wie Nominatim umwandeln
            const results = features.map(f => {
                const props = f.properties || {};
                const geo = f.geometry?.coordinates || [0, 0];
                const typeMap = {
                    'highway': props.osm_type === 'N' ? 'bus_stop' : props.osm_value || 'road',
                    'amenity': 'amenity',
                    'place': props.osm_value || 'place',
                    'building': 'building',
                    'railway': 'railway',
                    'landuse': 'landuse',
                };
                return {
                    display_name: [props.name, props.city || props.locality || '', props.country || ''].filter(Boolean).join(', '),
                    lat: geo[1] || 0,
                    lon: geo[0] || 0,
                    type: typeMap[props.osm_key] || props.osm_key || props.osm_value || 'unknown',
                    addresstype: props.osm_key || props.osm_value || 'unknown',
                    address: { postcode: props.postcode || '' },
                };
            });
            suggestionsCache[cacheKey] = results;
            return results;
        }

        function getTypeLabel(item) {
            const type = item.type || item.addresstype || '';
            switch (type) {
                case 'house_number': return 'Hausnr.';
                case 'street': return 'Straße';
                case 'city': return 'Stadt';
                case 'town': return 'Stadt';
                case 'village': return 'Dorf';
                case 'state': return 'Bundesland';
                case 'country': return 'Land';
                case 'amenity': return 'Ort';
                case 'railway': return 'Bahnhof';
                case 'tourism': return 'Tourismus';
                default: return type;
            }
        }

        function renderSuggestions(inputEl, dropdownEl, data) {
            dropdownEl.innerHTML = '';
            if (!data || data.length === 0) {
                dropdownEl.classList.remove('visible');
                return;
            }

            // Nur Straßen – alles andere rausfiltern
            const strassenTypen = ['house_number', 'street', 'road', 'residential', 'primary', 'secondary',
                                   'tertiary', 'trunk', 'service', 'living_street', 'pedestrian', 'footway',
                                   'cycleway', 'path', 'track', 'steps', 'unclassified'];
            let strassen = data.filter(item => {
                const t = item.type || item.addresstype || '';
                return strassenTypen.includes(t);
            });
            if (strassen.length === 0) {
                dropdownEl.classList.remove('visible');
                return;
            }

            const maxItems = 8;
            // Deduplizieren: gleicher Straßenname + Stadt nur einmal
            const seen = new Set();
            const items = [];
            for (const item of strassen) {
                const parts = (item.display_name || '').split(',').map(s => s.trim());
                const name = parts[0] || '';
                const city = parts[1] || '';
                const key = name.toLowerCase() + '|' + city.toLowerCase();
                if (seen.has(key)) continue;
                seen.add(key);
                items.push(item);
                if (items.length >= maxItems) break;
            }

            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                const parts = (item.display_name || '').split(',').map(s => s.trim());
                const name = parts[0] || '';
                const city = parts[1] || '';
                const plz = extractPLZ(item);
                // Format: "Straße, Stadt [PLZ]" wie regenampel.de
                let anzeige = name;
                if (city) anzeige += `, ${city}`;
                if (plz) anzeige += ` <strong>[${plz}]</strong>`;
                div.innerHTML = anzeige;
                div.addEventListener('click', () => {
                    inputEl.value = anzeige.replace(/ <strong>\[\d{5}\]<\/strong>/, '');
                    dropdownEl.classList.remove('visible');
                });
                dropdownEl.appendChild(div);
            });
            dropdownEl.classList.add('visible');
        }

        function hideAllDropdowns() {
            DOM.startSuggestions.classList.remove('visible');
            DOM.zielSuggestions.classList.remove('visible');
        }

        function setupAutocomplete(inputEl, dropdownEl) {
            let pendingQuery = '';
            let pendingAbort = null;

            // Bei jedem Tastendruck sofort API anfragen (wie regenampel.de – kein Debounce)
            // Der suggestionsCache sorgt dafür, dass wiederholte gleiche Anfragen schnell sind
            inputEl.addEventListener('input', () => {
                const val = inputEl.value.trim();
                if (val.length === 0) {
                    dropdownEl.classList.remove('visible');
                    pendingQuery = '';
                    return;
                }
                // Gleiche Anfrage wie gerade läuft? Überspringen
                if (val === pendingQuery) return;
                pendingQuery = val;

                // Alten Request abbrechen, falls noch nicht abgeschlossen
                if (pendingAbort) {
                    pendingAbort.abort();
                }
                const ac = new AbortController();
                pendingAbort = ac;

                // Direkt los (kein setTimeout)
                fetchSuggestions(val, ac.signal).then(data => {
                    if (inputEl.value.trim() !== val) return;
                    renderSuggestions(inputEl, dropdownEl, data);
                }).catch(err => {
                    // Abgebrochene Requests ignorieren
                    if (err.name === 'AbortError') return;
                });
            });

            // Beim Fokussieren: keine Aktion, nur wenn bereits Vorschläge da sind
            inputEl.addEventListener('focus', () => {
                const val = inputEl.value.trim();
                if (val.length === 0) return;
                if (dropdownEl.children.length > 0) {
                    dropdownEl.classList.add('visible');
                }
            });

            // Beim Verlassen: Dropdown ausblenden
            inputEl.addEventListener('blur', () => {
                setTimeout(() => dropdownEl.classList.remove('visible'), 200);
            });

            // Tastatur-Navigation im Dropdown
            inputEl.addEventListener('keydown', (e) => {
                const items = dropdownEl.querySelectorAll('.suggestion-item');
                if (!items.length) return;

                const activeIdx = Array.from(items).findIndex(el => el.classList.contains('highlighted'));

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const next = activeIdx < items.length - 1 ? activeIdx + 1 : 0;
                    items.forEach(el => el.classList.remove('highlighted'));
                    items[next].classList.add('highlighted');
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prev = activeIdx > 0 ? activeIdx - 1 : items.length - 1;
                    items.forEach(el => el.classList.remove('highlighted'));
                    items[prev].classList.add('highlighted');
                } else if (e.key === 'Enter') {
                    if (activeIdx >= 0) {
                        e.preventDefault();
                        items[activeIdx].click();
                    }
                } else if (e.key === 'Escape') {
                    dropdownEl.classList.remove('visible');
                }
            });
        }

        // Autocomplete für beide Felder aktivieren
        setupAutocomplete(DOM.start, DOM.startSuggestions);
        setupAutocomplete(DOM.ziel, DOM.zielSuggestions);

        // Smart Clear für beide Felder aktivieren
        setupSmartClear(DOM.start);
        setupSmartClear(DOM.ziel);

        // Dropdown schließen bei Klick außerhalb
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.autocomplete-wrapper')) {
                hideAllDropdowns();
            }
        });

        // ============================================================
        // 9. Event Listener
        // ============================================================

        // Swap-Button: Start und Ziel tauschen
        DOM.swapBtn = document.getElementById('swapBtn');
        DOM.swapBtn.addEventListener('click', () => {
            const temp = DOM.start.value;
            DOM.start.value = DOM.ziel.value;
            DOM.ziel.value = temp;
            // defaultValues ebenfalls tauschen
            const tempDefault = DOM.start.defaultValue;
            DOM.start.defaultValue = DOM.ziel.defaultValue;
            DOM.ziel.defaultValue = tempDefault;
            // Gespeicherte Adressen aktualisieren
            saveCurrentAddresses();
            // Dropdowns schließen
            hideAllDropdowns();
        });

        // Geo-Button: Aktuellen Standort per Reverse Geocoding ermitteln
        DOM.geoBtn = document.getElementById('geoBtn');
        DOM.geoBtn.addEventListener('click', async () => {
            if (!navigator.geolocation) {
                showError('Geolocation wird von deinem Browser nicht unterstützt.');
                return;
            }

            // loading-Zustand setzen (CSS-Klasse + aria)
            DOM.geoBtn.classList.add('loading');
            DOM.geoBtn.textContent = '⏳';
            DOM.geoBtn.setAttribute('aria-label', 'Standort wird ermittelt...');
            DOM.geoBtn.disabled = true;

            // Vorherige Requests abbrechen
            if (activeController) {
                activeController.abort();
            }
            activeController = new AbortController();
            const signal = activeController.signal;

            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000
                    });
                });
                const { latitude, longitude } = pos.coords;
                // Reverse Geocoding via Nominatim
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&addressdetails=1`;
                const resp = await fetch(url, {
                    headers: { 'User-Agent': 'BleibeIchTrocken/1.0' },
                    signal,
                });
                if (!resp.ok) throw new Error('Reverse Geocoding fehlgeschlagen');
                const data = await resp.json();
                const adresse = data.display_name || `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                DOM.start.value = adresse;
                DOM.start.defaultValue = adresse;
                saveCurrentAddresses();
                hideAllDropdowns();
            } catch (err) {
                if (err.name === 'AbortError') return;
                if (err.code === 1) {
                    showError('Bitte Standortzugriff erlauben, um den aktuellen Ort zu nutzen.');
                } else {
                    showError('Standort konnte nicht ermittelt werden: ' + err.message);
                }
            } finally {
                DOM.geoBtn.classList.remove('loading');
                DOM.geoBtn.textContent = '📍';
                DOM.geoBtn.setAttribute('aria-label', 'Aktuellen Standort verwenden');
                DOM.geoBtn.disabled = false;
                activeController = null;
            }
        });

        // Enter-Taste: Start → springt zu Ziel, Ziel → checkt
        DOM.start.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                DOM.ziel.focus();
            }
        });
        DOM.ziel.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkWeather();
            }
        });

        // Auto-Check beim Laden entfernt – Seite startet ruhig, kein Sprung nach unten
    </script>

    <!-- ========== Scroll-to-Top Button ========== -->
    <button type="button" class="scroll-top-btn" id="scrollTopBtn" aria-label="Nach oben scrollen" title="Nach oben">
        <span class="arrow-up">↑</span>
    </button>

    <script>
        // ============================================================
        // 10. Scroll-to-Top Button
        // ============================================================
        (function initScrollToTop() {
            const scrollBtn = document.getElementById('scrollTopBtn');
            if (!scrollBtn) return;

            // Nur auf Mobil (< 768px) aktiv – CSS blendet auf Desktop aus
            // Throttle für effizienteres Scroll-Handling
            let ticking = false;
            let lastScrollY = 0;

            function checkScroll() {
                const scrollY = window.scrollY || window.pageYOffset;
                const docHeight = Math.max(
                    document.body.scrollHeight,
                    document.documentElement.scrollHeight,
                    document.body.offsetHeight,
                    document.documentElement.offsetHeight,
                    document.body.clientHeight,
                    document.documentElement.clientHeight
                );
                const viewportHeight = window.innerHeight;
                const scrollBottom = scrollY + viewportHeight;

                // Button einblenden, wenn zu > 80% der Seite gescrollt wurde
                const threshold = docHeight * 0.80;
                if (scrollBottom >= threshold && scrollY > 200) {
                    scrollBtn.classList.add('visible');
                } else {
                    scrollBtn.classList.remove('visible');
                }

                lastScrollY = scrollY;
                ticking = false;
            }

            window.addEventListener('scroll', () => {
                if (!ticking) {
                    window.requestAnimationFrame(() => {
                        checkScroll();
                    });
                    ticking = true;
                }
            }, { passive: true });

            // Initial check
            checkScroll();

            // Klick-Event: Sanft nach oben scrollen
            scrollBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        })();
    </script>
</body>
