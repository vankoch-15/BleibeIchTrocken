<head>
    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Apple Touch Icon – wird per JavaScript als PNG aus Canvas generiert -->
    <link rel="apple-touch-icon" sizes="180x180" id="appleTouchIcon" href="" />

    <!-- Safari-Theme-Farbe (Statusleiste) – dunkel + hell -->
    <meta name="theme-color" content="#1a237e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Preconnect für externe APIs -->
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" />
    <link rel="preconnect" href="https://photon.komoot.io" />
    <link rel="preconnect" href="https://api.open-meteo.com" />

    <!-- Apple Touch Icon als echtes PNG via Canvas generieren (iOS-kompatibel) -->
    <script>
        (function() {
            try {
                var c = document.createElement('canvas');
                c.width = 180;
                c.height = 180;
                var ctx = c.getContext('2d');

                // Hintergrund: abgerundetes Rechteck mit Farbverlauf
                var grd = ctx.createLinearGradient(0, 0, 180, 180);
                grd.addColorStop(0, '#1a237e');
                grd.addColorStop(1, '#283593');

                var r = 32;
                ctx.beginPath();
                ctx.moveTo(r, 0);
                ctx.lineTo(180 - r, 0);
                ctx.quadraticCurveTo(180, 0, 180, r);
                ctx.lineTo(180, 180 - r);
                ctx.quadraticCurveTo(180, 180, 180 - r, 180);
                ctx.lineTo(r, 180);
                ctx.quadraticCurveTo(0, 180, 0, 180 - r);
                ctx.lineTo(0, r);
                ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.closePath();
                ctx.fillStyle = grd;
                ctx.fill();

                // Sonne
                var sx = 64, sy = 68, sr = 26;
                ctx.beginPath();
                ctx.arc(sx, sy, sr, 0, Math.PI * 2);
                ctx.fillStyle = '#ffd54f';
                ctx.fill();

                // Sonnenstrahlen
                ctx.strokeStyle = '#ffd54f';
                ctx.lineWidth = 3.5;
                ctx.lineCap = 'round';
                var rays = [
                    [sx, sy - sr - 6, sx, sy - sr - 14],
                    [sx, sy + sr + 6, sx, sy + sr + 14],
                    [sx - sr - 6, sy, sx - sr - 14, sy],
                    [sx + sr + 6, sy, sx + sr + 14, sy],
                    [sx - sr*0.7 - 5, sy - sr*0.7 - 5, sx - sr*0.7 - 11, sy - sr*0.7 - 11],
                    [sx + sr*0.7 + 5, sy + sr*0.7 + 5, sx + sr*0.7 + 11, sy + sr*0.7 + 11],
                    [sx + sr*0.7 + 5, sy - sr*0.7 - 5, sx + sr*0.7 + 11, sy - sr*0.7 - 11],
                    [sx - sr*0.7 - 5, sy + sr*0.7 + 5, sx - sr*0.7 - 11, sy + sr*0.7 + 11],
                ];
                for (var i = 0; i < rays.length; i++) {
                    ctx.beginPath();
                    ctx.moveTo(rays[i][0], rays[i][1]);
                    ctx.lineTo(rays[i][2], rays[i][3]);
                    ctx.stroke();
                }

                // Regenwolke
                ctx.fillStyle = '#78909c';
                ctx.beginPath();
                ctx.moveTo(92, 112);
                ctx.quadraticCurveTo(90, 102, 100, 100);
                ctx.quadraticCurveTo(102, 90, 114, 92);
                ctx.quadraticCurveTo(118, 80, 132, 86);
                ctx.quadraticCurveTo(140, 76, 148, 88);
                ctx.quadraticCurveTo(156, 82, 160, 94);
                ctx.quadraticCurveTo(162, 102, 155, 106);
                ctx.lineTo(100, 108);
                ctx.quadraticCurveTo(92, 108, 92, 112);
                ctx.fill();

                // Regentropfen
                ctx.strokeStyle = '#42a5f5';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.globalAlpha = 0.7;
                var drops = [
                    [126, 102, 126, 90],
                    [132, 102, 132, 90],
                    [138, 102, 138, 90],
                ];
                for (var j = 0; j < drops.length; j++) {
                    ctx.beginPath();
                    ctx.moveTo(drops[j][0], drops[j][1]);
                    ctx.lineTo(drops[j][2], drops[j][3]);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;

                // "?"-Zeichen
                ctx.fillStyle = 'white';
                ctx.font = 'bold 28px HelveticaNeue, Helvetica, Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('?', 90, 150);

                // Als PNG Data-URI setzen
                var link = document.getElementById('appleTouchIcon');
                if (link) {
                    link.href = c.toDataURL('image/png');
                }
            } catch(e) {
                console.log('Icon-Generierung fehlgeschlagen:', e);
            }
        })();
    </script>

    <style>

            /* Hintergründe */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            min-height: 100dvh;
        }

        html {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-mid) 50%, var(--primary-light) 100%);

        body {

            background: transparent;
            min-height: 100dvh;
            display: flex;

            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 1rem);
            color: var(--text-primary);
            touch-action: manipulation;
            -webkit-user-select: none;

                border-color: rgba(0, 0, 0, 0.2);

        .suggestion-item {

            font-size: 0.85rem;

            border-bottom: 1px solid #f0f0f0;

        }

        .suggestion-item:last-child {

        }

        .suggestion-item:hover,
        .suggestion-item.highlighted {

        .suggestion-item .suggestion-type {

        label {

        input:focus-visible,

            border-radius: var(--radius);

<body>
    <div class="app-container">
        <h1>🌤️ Bleibe ich trocken?</h1>
        <p class="subtitle">Finde heraus, ob dich unterwegs Regen erwischt</p>

        <!-- Eingabe -->
        <div class="card" role="search" aria-label="Wetter-Check-Formular">
            <div class="form-group">
                <label for="start">Startort</label>
                <div class="autocomplete-wrapper" role="combobox" aria-expanded="false" aria-haspopup="listbox">
                    <input type="text" id="start" placeholder="z. B. Berlin Hauptbahnhof" value="Berlin Hauptbahnhof" autocomplete="off" aria-autocomplete="list" aria-controls="startSuggestions" aria-expanded="false" />
                    <button type="button" id="geoBtn" class="geo-btn" title="Aktuellen Standort verwenden" aria-label="Aktuellen Standort ermitteln">📍</button>
                    <div class="suggestions-dropdown" id="startSuggestions" role="listbox" aria-label="Adressvorschläge"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="ziel">Zielort</label>
                <div class="autocomplete-wrapper" role="combobox" aria-expanded="false" aria-haspopup="listbox">
                    <input type="text" id="ziel" placeholder="z. B. Brandenburger Tor" value="Brandenburger Tor, Berlin" autocomplete="off" aria-autocomplete="list" aria-controls="zielSuggestions" aria-expanded="false" />
                    <button type="button" id="swapBtn" class="swap-btn" title="Start und Ziel tauschen" aria-label="Start und Ziel tauschen">⇄</button>
                    <div class="suggestions-dropdown" id="zielSuggestions" role="listbox" aria-label="Adressvorschläge"></div>
                </div>
            </div>
            <div class="form-group" role="radiogroup" aria-label="Verkehrsmittel auswählen">
                <label>Verkehrsmittel</label>
                <div class="toggle-group">
                    <button type="button" class="toggle-btn active" data-mode="walking" data-speed="5" role="radio" aria-checked="true" tabindex="0">
                        🚶 Gehen (ca. 5 km/h)
                    </button>
                    <button type="button" class="toggle-btn" data-mode="bicycle" data-speed="15" role="radio" aria-checked="false" tabindex="-1">
                        🚴 Fahrrad (ca. 15 km/h)
                    </button>
                </div>
            </div>
            <button class="btn" id="checkBtn" aria-label="Wetter checken">🌧️ Checken – Bleibe ich trocken?</button>

        </div>

        <!-- Loading -->
        <div class="loading" id="loading" role="status" aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <div class="loading-text">Berechne Route und checke Wetter...</div>
        </div>

        <!-- Ergebnis -->
        <div class="card result-card" id="resultCard" aria-live="polite" aria-atomic="true">
            <div class="verdict" id="verdict" role="alert"></div>
            <div class="sub-verdict" id="subVerdict"></div>

            <div class="timeline" aria-label="Regen-Vorhersage entlang der Route">
                <div class="timeline-track" aria-hidden="true">
                    <div class="timeline-fill" id="timelineFill"></div>
                </div>
                <div class="timeline-points" id="timelinePoints" role="list"></div>
            </div>

            <div class="details-grid" id="detailsGrid"></div>

            <div class="slot-section" id="slotSection">
                <div class="slot-section-title">⏰ Optimaler Startzeitpunkt</div>
                <div class="slot-timeline" id="slotTimeline" role="list"></div>
                <div class="slot-recommendation" id="slotRecommendation" aria-live="polite"></div>
            </div>

            <div class="wind-section" id="windSection" style="display:none;">
                <div class="wind-header">
                    <span class="wind-icon" aria-hidden="true">🌬️</span>
                    <span>Fahrrad-Komfort-Index</span>
                </div>
                <div class="wind-feedback" id="windFeedback"></div>
                <div class="wind-meta" id="windMeta"></div>
                <div class="wind-duration-note" id="windDurationNote"></div>
            </div>

            <div class="bonus-section" id="bonusSection" style="display:none;">
                <div class="bonus-header">🌟 Dein Bonus für heute</div>
                <div class="bonus-content" id="bonusContent"></div>
                <div class="bonus-stats" id="bonusStats"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // App: "Bleibe ich trocken?" – Single-Page-Anwendung
        // ============================================================

        const DOM = {
            start: document.getElementById('start'),
            ziel: document.getElementById('ziel'),
            checkBtn: document.getElementById('checkBtn'),
            loading: document.getElementById('loading'),
            resultCard: document.getElementById('resultCard'),
            verdict: document.getElementById('verdict'),
            subVerdict: document.getElementById('subVerdict'),
            timelinePoints: document.getElementById('timelinePoints'),
            timelineFill: document.getElementById('timelineFill'),
            detailsGrid: document.getElementById('detailsGrid'),
            errorMsg: document.getElementById('errorMsg'),
            toggleBtns: document.querySelectorAll('.toggle-btn'),
            startSuggestions: document.getElementById('startSuggestions'),
            zielSuggestions: document.getElementById('zielSuggestions'),
            slotSection: document.getElementById('slotSection'),
            slotTimeline: document.getElementById('slotTimeline'),
            slotRecommendation: document.getElementById('slotRecommendation'),
            windSection: document.getElementById('windSection'),
            windFeedback: document.getElementById('windFeedback'),
            windMeta: document.getElementById('windMeta'),
            windDurationNote: document.getElementById('windDurationNote'),
            bonusSection: document.getElementById('bonusSection'),
            bonusContent: document.getElementById('bonusContent'),
            bonusStats: document.getElementById('bonusStats'),
        };

        // Globale Variable: aktuell gewähltes Verkehrsmittel
        let currentMode = 'walking';
        let currentSpeed = 5;

        // AbortController für abgebrochene API-Requests
        let activeController = null;

        // ============================================================
        // 1. Geocoding via Nominatim + Cache
        // ============================================================

        // Cache-Objekt: Speichert bereits abgefragte Adressen (Key = normalisierte Adresse)
        const geocodeCache = {};

        /**
         * Normalisiert einen Adress-String für den Cache-Key:
         *  - trim
         *  - Kleinschreibung
         *  - reduziert überflüssige Leerzeichen
         */
        function normalizeAddress(address) {
            return address.trim().toLowerCase().replace(/\s+/g, ' ');
        }

        async function geocode(address, signal) {
            const key = normalizeAddress(address);

            // 1. Cache-Check: sofort zurückgeben, falls bereits vorhanden
            if (geocodeCache[key]) {
                return geocodeCache[key];
            }

            // 2. Netzwerk-Anfrage (nur bei Cache-Miss)
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`;
            const resp = await fetch(url, {
                headers: { 'User-Agent': 'BleibeIchTrocken/1.0' },
                signal,
            });
            if (!resp.ok) throw new Error(`Nominatim-Fehler: ${resp.status}`);
            const data = await resp.json();
            if (!data.length) throw new Error(`Konnte "${address}" nicht finden.`);

            const result = {
                lat: parseFloat(data[0].lat),
                lon: parseFloat(data[0].lon),
                displayName: data[0].display_name,
            };

            // 3. Ergebnis ins Cache speichern
            geocodeCache[key] = result;

            return result;
        }

        // ============================================================
        // 2. Open-Meteo Wetter + Wind-Daten
        // ============================================================
        async function fetchWeather(lat, lon, signal) {
            const params = new URLSearchParams({
                latitude: lat,
                longitude: lon,
                hourly: 'precipitation_probability,precipitation,wind_speed_10m,wind_direction_10m',
                timezone: 'auto',
                forecast_days: 2,
            });

            const url = `https://api.open-meteo.com/v1/forecast?${params}`;
            const resp = await fetch(url, { signal });
            if (!resp.ok) throw new Error(`Open-Meteo-Fehler: ${resp.status}`);
            const data = await resp.json();

            return {
                times: data.hourly.time,
                precipProb: data.hourly.precipitation_probability || [],
                precip: data.hourly.precipitation || [],
                windSpeed: data.hourly.wind_speed_10m || [],
                windDirection: data.hourly.wind_direction_10m || [],
            };
        }

        // Wetter für eine bestimmte Zielzeit aus dem gecachten hourly-Array abrufen
        function getWeatherAtTime(weatherData, targetDate) {
            const times = weatherData.times;
            let bestIdx = 0;
            let bestDiff = Infinity;
            for (let i = 0; i < times.length; i++) {
                const t = new Date(times[i]);
                const diff = Math.abs(t - targetDate);
                if (diff < bestDiff) {
                    bestDiff = diff;
                    bestIdx = i;
                }
            }
            const mm = weatherData.precip[bestIdx] || 0;
            const prob = weatherData.precipProb[bestIdx] || 0;
            return {
                time: times[bestIdx],
                precipitation_probability: prob,
                precipitation: mm,
                willRain: mm > 0,
                wind_speed: weatherData.windSpeed[bestIdx] || 0,
                wind_direction: weatherData.windDirection[bestIdx] || 0,
            };
        }

        // ============================================================
        // 2c. Bearing (Fahrtrichtung) berechnen
        // ============================================================
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = (deg) => deg * Math.PI / 180;
            const toDeg = (rad) => rad * 180 / Math.PI;

            const φ1 = toRad(lat1);
            const φ2 = toRad(lat2);
            const λ1 = toRad(lon1);
            const λ2 = toRad(lon2);

            const y = Math.sin(λ2 - λ1) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) -
                      Math.sin(φ1) * Math.cos(φ2) * Math.cos(λ2 - λ1);
            const bearing = toDeg(Math.atan2(y, x));
            return (bearing + 360) % 360; // 0-360°
        }

        // ============================================================
        // 2d. Fahrrad-Komfort-Index (Wind-Analyse)
        // ============================================================
        function analyzeWind(bearing, windSpeed, windDirection, mode) {
            // Nur für Fahrrad relevant
            if (mode !== 'bicycle') {
                return { show: false };
            }

            if (!windSpeed || windSpeed < 0.5) {
                return {
                    show: true,
                    type: 'calm',
                    label: 'Windstill',
                    icon: '🍃',
                    message: 'Kein nennenswerter Wind – ideale Fahrradbedingungen.',
                    speed: 0,
                    durationFactor: 1.0,
                };
            }

            // Differenz zwischen Windrichtung und Fahrtrichtung normalisieren (0-180°)
            let diff = Math.abs(windDirection - bearing);
            if (diff > 180) diff = 360 - diff;

            let type, label, icon, message, durationFactor;

            // Gegenwind: Differenz nahe 180°
            if (diff >= 135) {
                type = 'headwind';
                label = 'Gegenwind';
                icon = '🌬️⬆️';
                if (windSpeed >= 20) {
                    message = 'Vorsicht: Starker Gegenwind! Du wirst länger brauchen.';
                    durationFactor = 1.0 + Math.min(0.20, windSpeed / 100); // 10-20% mehr
                } else if (windSpeed >= 10) {
                    message = 'Mäßiger Gegenwind – etwas mehr Kraft nötig.';
                    durationFactor = 1.0 + Math.min(0.10, windSpeed / 150);
                } else {
                    message = 'Leichter Gegenwind – kaum spürbar.';
                    durationFactor = 1.02;
                }
            }
            // Rückenwind: Differenz nahe 0°
            else if (diff <= 45) {
                type = 'tailwind';
                label = 'Rückenwind';
                icon = '🌬️⬇️';
                if (windSpeed >= 20) {
                    message = 'Super: Rückenwind schiebt dich an!';
                    durationFactor = 1.0 - Math.min(0.15, windSpeed / 150);
                } else if (windSpeed >= 10) {
                    message = 'Guter Rückenwind – du rollst leichter.';
                    durationFactor = 1.0 - Math.min(0.08, windSpeed / 200);
                } else {
                    message = 'Leichter Rückenwind – kleiner Schub.';
                    durationFactor = 0.98;
                }
            }
            // Seitenwind: Differenz ~90°
            else {
                type = 'crosswind';
                label = 'Seitenwind';
                icon = '🌬️➡️';
                if (windSpeed >= 20) {
                    message = 'Achtung: Böiger Seitenwind, fahre vorsichtig.';
                } else if (windSpeed >= 10) {
                    message = 'Spürbarer Seitenwind – etwas Konzentration nötig.';
                } else {
                    message = 'Leichter Seitenwind – kaum störend.';
                }
                durationFactor = 1.0; // Seitenwind ändert Dauer kaum
            }

            return {
                show: true,
                type,
                label,
                icon,
                message,
                speed: windSpeed,
                bearing: Math.round(bearing),
                windDirection: Math.round(windDirection),
                diff: Math.round(diff),
                durationFactor,
            };
        }

        // ============================================================
        // 2e. Bonus-Berechnung (CO₂-Ersparnis & Kalorien)
        // ============================================================
        function calculateBonus(distKm, totalMinutes, mode) {
            const CO2_PER_KM = 150; // g CO2 pro km (PKW)
            const kcalFactors = { walking: 4, bicycle: 8 }; // kcal pro Minute

            const co2Kg = (distKm * CO2_PER_KM) / 1000;
            const kcal = Math.round(totalMinutes * (kcalFactors[mode] || 4));

            return { co2Kg, kcal };
        }

        // ============================================================
        // 6d. Bonus-Bereich rendern (Motivation)
        // ============================================================
        function renderBonus(distKm, totalMinutes, mode, weatherResults) {
            const section = DOM.bonusSection;
            const contentEl = DOM.bonusContent;
            const statsEl = DOM.bonusStats;

            if (!distKm || distKm < 0.1) {
                section.style.display = 'none';
                return;
            }

            const bonus = calculateBonus(distKm, totalMinutes, mode);
            const modeEmoji = mode === 'bicycle' ? '🚴' : '🚶';
            const modeLabel = mode === 'bicycle' ? 'Rad' : 'Fußweg';

            // Prüfen, ob Regen auf der Route ist
            const hasRain = weatherResults.some(p => p.weather.precipitation > 0);

            // Motivations-Text je nach Wetter
            let motivationText = '';
            if (hasRain) {
                motivationText = `Trotz Regen lohnt es sich! 🌈`;
            } else {
                const weatherEmojis = ['☀️', '🌤️', '✨'];
                const randomEmoji = weatherEmojis[Math.floor(Math.random() * weatherEmojis.length)];
                motivationText = `Perfektes Wetter! ${randomEmoji}`;
            }

            section.style.display = 'block';

            // Haupt-Content-Zeile – kompakter, kürzerer Text
            const co2Str = bonus.co2Kg.toFixed(2);
            const kcalStr = bonus.kcal.toLocaleString('de-DE');
            contentEl.innerHTML = `
                ${motivationText}<br>
                <span class="bonus-highlight">${co2Str} kg CO₂</span> 🌱 gespart · <span class="bonus-highlight">${kcalStr} kcal</span> 🔥 verbrannt
            `;

            // Stat-Kacheln
            statsEl.innerHTML = `
                <div class="bonus-stat">
                    <div class="stat-icon">🌱</div>
                    <div class="stat-value">${bonus.co2Kg.toFixed(2)} kg</div>
                    <div class="stat-label">CO₂ gespart</div>
                </div>
                <div class="bonus-stat">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value">${bonus.kcal.toLocaleString('de-DE')}</div>
                    <div class="stat-label">Kalorien</div>
                </div>
                <div class="bonus-stat">
                    <div class="stat-icon">${modeEmoji}</div>
                    <div class="stat-value">${formatDuration(totalMinutes)}</div>
                    <div class="stat-label">${modeLabel}</div>
                </div>
            `;
        }
        function getWeatherAdvice(mm) {
            if (mm === 0 || mm === null || mm === undefined) {
                return {
                    level: 'dry',
                    label: 'Trocken',
                    icon: '🟢',
                    message: 'Du bleibst trocken!',
                };
            }
            if (mm <= 0.5) {
                return {
                    level: 'light',
                    label: 'Leichter Regen',
                    icon: '🟡',
                    message: 'Nur leichter Nieselregen – eine Kapuze reicht.',
                };
            }
            if (mm <= 2.0) {
                return {
                    level: 'moderate',
                    label: 'Mäßiger Regen',
                    icon: '🟠',
                    message: 'Es regnet – nimm einen Regenschirm oder Regenjacke mit.',
                };
            }
            // > 2.0 mm
            return {
                level: 'heavy',
                label: 'Starkregen',
                icon: '🔴',
                message: 'Starkregen-Warnung! Such dir lieber einen Unterstand oder warte ab.',
            };
        }

        // ============================================================
        // 3. Route interpolieren
        // ============================================================
        function interpolatePoints(startLat, startLon, endLat, endLon, numPoints = 3) {
            const points = [];
            for (let i = 0; i < numPoints; i++) {
                const fraction = i / (numPoints - 1);
                points.push({
                    lat: startLat + (endLat - startLat) * fraction,
                    lon: startLon + (endLon - startLon) * fraction,
                    label: i === 0 ? 'Start' : (i === numPoints - 1 ? 'Ziel' : `Punkt ${i + 1}`),
                });
            }
            // Benenne den mittleren Punkt um
            if (numPoints === 3) {
                points[1].label = 'Mitte';
            } else if (numPoints > 2) {
                const mid = Math.floor(numPoints / 2);
                points[mid].label = 'Mitte';
            }
            return points;
        }

        // ============================================================
        // 4. Geschätzte Dauer berechnen (Luftlinie ~) 
        // ============================================================
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function estimateDuration(distKm, speedKmh) {
            return (distKm / speedKmh) * 3600; // in Sekunden
        }

        // ============================================================
        // 5. Hauptlogik
        // ============================================================
        async function checkWeather() {
            // Vorherige Requests abbrechen
            if (activeController) {
                activeController.abort();
            }
            activeController = new AbortController();
            const signal = activeController.signal;

            const startStr = DOM.start.value.trim();
            const zielStr = DOM.ziel.value.trim();
            const mode = currentMode;

            if (!startStr || !zielStr) {
                showError('Bitte Start- und Zielort eingeben.');
                return;
            }

            // Adressen für den nächsten App-Start speichern
            saveCurrentAddresses();

            hideError();
            DOM.resultCard.classList.remove('visible');
            DOM.loading.classList.add('visible');
            DOM.checkBtn.disabled = true;

            try {
                // 5a. Geocoding
                const [startGeo, zielGeo] = await Promise.all([
                    geocode(startStr, signal),
                    geocode(zielStr, signal),
                ]);

                // 5b. Distanz & Dauer
                const distKm = haversineDistance(startGeo.lat, startGeo.lon, zielGeo.lat, zielGeo.lon);
                const speedKmh = currentSpeed;
                let totalSeconds = estimateDuration(distKm, speedKmh);
                let totalMinutes = totalSeconds / 60;

                // 5b1. Bearing (Fahrtrichtung) berechnen
                const bearing = calculateBearing(startGeo.lat, startGeo.lon, zielGeo.lat, zielGeo.lon);

                // 5c. Checkpunkte (Start, Mitte, Ziel)
                const points = interpolatePoints(startGeo.lat, startGeo.lon, zielGeo.lat, zielGeo.lon, 3);

                // 5d. Wetterdaten für alle 3 Koordinaten laden (einmalig pro Koordinate)
                const [startWeather, midWeather, endWeather] = await Promise.all([
                    fetchWeather(points[0].lat, points[0].lon, signal),
                    fetchWeather(points[1].lat, points[1].lon, signal),
                    fetchWeather(points[2].lat, points[2].lon, signal),
                ]);

                // Wind-Daten aus dem Start-Wetter extrahieren
                const now = new Date();
                const windAtStart = getWeatherAtTime(startWeather, now);
                const windAnalysis = analyzeWind(bearing, windAtStart.wind_speed, windAtStart.wind_direction, mode);

                // 5b3. Dauer bei starkem Wind anpassen
                if (windAnalysis.show && windAnalysis.durationFactor !== 1.0) {
                    totalSeconds = totalSeconds * windAnalysis.durationFactor;
                    totalMinutes = totalSeconds / 60;
                }

                const weatherDataMap = {
                    [points[0].label]: startWeather,
                    [points[1].label]: midWeather,
                    [points[2].label]: endWeather,
                };

                // 5e. Vier Startzeit-Slots auswerten
                const slotOffsets = [0, 15, 30, 45]; // Minuten
                const slotLabels = ['Sofort', '+15m', '+30m', '+45m'];

                const slotResults = slotOffsets.map((offsetMin, idx) => {
                    const startTime = new Date(now.getTime() + offsetMin * 60 * 1000);
                    const pointResults = points.map((p) => {
                        const fraction = p.label === 'Start' ? 0 : (p.label === 'Ziel' ? 1 : 0.5);
                        const offsetMs = totalSeconds * fraction * 1000;
                        const targetTime = new Date(startTime.getTime() + offsetMs);
                        const weather = getWeatherAtTime(weatherDataMap[p.label], targetTime);
                        const advice = getWeatherAdvice(weather.precipitation);
                        return { ...p, targetTime, weather, advice };
                    });

                    // Höchste Intensität in diesem Slot
                    const levelRank = { dry: 0, light: 1, moderate: 2, heavy: 3 };
                    const worst = pointResults.reduce((w, c) =>
                        levelRank[c.advice.level] > levelRank[w.advice.level] ? c : w
                    , pointResults[0]);

                    // Gesamt-mm (max) für Ranking
                    const maxMm = Math.max(...pointResults.map(r => r.weather.precipitation));

                    return {
                        slotIndex: idx,
                        label: slotLabels[idx],
                        startTime,
                        points: pointResults,
                        worst,
                        maxMm,
                    };
                });

                // 5f. Besten Slot ermitteln (niedrigste Intensität, bei Gleichstand geringster mm)
                const levelRank2 = { dry: 0, light: 1, moderate: 2, heavy: 3 };
                const bestSlot = slotResults.reduce((best, curr) => {
                    const bestRank = levelRank2[best.worst.advice.level];
                    const currRank = levelRank2[curr.worst.advice.level];
                    if (currRank < bestRank) return curr;
                    if (currRank === bestRank && curr.maxMm < best.maxMm) return curr;
                    return best;
                }, slotResults[0]);

                // 5g. UI rendern (mit dem "Jetzt"-Slot als Hauptansicht)
                renderResult(slotResults[0].points, slotResults[0].worst, distKm, totalMinutes, mode, startGeo, zielGeo, slotResults, bestSlot, windAnalysis);

            } catch (err) {
                // Abgebrochene Requests ignorieren
                if (err.name === 'AbortError') return;
                showError(err.message);
            } finally {
                DOM.loading.classList.remove('visible');
                DOM.checkBtn.disabled = false;
                activeController = null;
            }
        }

        // ============================================================
        // 6. UI Rendering
        // ============================================================
        function renderResult(weatherResults, worstPoint, distKm, totalMinutes, mode, startGeo, zielGeo, slotResults, bestSlot, windAnalysis) {
            const verdictEl = DOM.verdict;
            const subVerdictEl = DOM.subVerdict;
            const timelinePointsEl = DOM.timelinePoints;
            const timelineFillEl = DOM.timelineFill;
            const detailsGridEl = DOM.detailsGrid;

            const worstAdvice = worstPoint.advice;

            // Verdict – Farbe + Text basierend auf der höchsten Intensität
            const levelNames = {
                dry: 'level-dry',
                light: 'level-light',
                moderate: 'level-moderate',
                heavy: 'level-heavy',
            };

            verdictEl.textContent = `${worstAdvice.icon} ${worstAdvice.message}`;
            verdictEl.className = `verdict ${levelNames[worstAdvice.level]}`;

            // Sub-Verdict – Details zu den Punkten
            const rainCount = weatherResults.filter(p => p.weather.precipitation > 0).length;
            if (rainCount === 0) {
                subVerdictEl.textContent = 'Kein Regen auf deiner Route vorhergesagt. 🌤️';
            } else {
                const maxMm = Math.max(...weatherResults.map(p => p.weather.precipitation));
                subVerdictEl.textContent = `${worstAdvice.icon} ${worstAdvice.label}: maximal ${maxMm.toFixed(1)} mm – ${rainCount} von ${weatherResults.length} Punkten betroffen.`;
            }

            // Timeline-Punkte
            timelinePointsEl.innerHTML = '';
            weatherResults.forEach((p) => {
                const mm = p.weather.precipitation;
                const prob = p.weather.precipitation_probability;

                let dotClass = 'dry';
                let weatherIcon = '☀️';
                if (mm > 2.0) {
                    dotClass = 'heavy';
                    weatherIcon = '🌧️🔴';
                } else if (mm > 0.5) {
                    dotClass = 'moderate';
                    weatherIcon = '🌧️🟠';
                } else if (mm > 0) {
                    dotClass = 'light';
                    weatherIcon = '🌦️🟡';
                } else if (prob > 30) {
                    weatherIcon = '☁️';
                }

                const timeStr = p.targetTime.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

                const col = document.createElement('div');
                col.className = 'timeline-point';
                col.innerHTML = `
                    <div class="point-dot ${dotClass}"></div>
                    <div class="point-label">${p.label}</div>
                    <div class="point-time">${timeStr}</div>
                    <div class="point-weather">
                        ${weatherIcon}
                        ${mm > 0 ? `<br>${mm.toFixed(1)} mm` : (prob > 0 ? `<br>${prob}%` : '')}
                    </div>
                `;
                timelinePointsEl.appendChild(col);
            });

            // Timeline-Füllung (Anteil der Strecke ohne Regen)
            const rainCount2 = weatherResults.filter(p => p.weather.precipitation > 0).length;
            const dryFraction = 1 - (rainCount2 / weatherResults.length);
            timelineFillEl.style.width = `${dryFraction * 100}%`;

            // Details
            const modeLabel = mode === 'walking' ? '🚶 Gehen' : '🚴 Fahrrad';
            detailsGridEl.innerHTML = `
                <div class="detail-item">
                    <div class="label">Strecke (Luftlinie)</div>
                    <div class="value">${distKm.toFixed(1)} km</div>
                </div>
                <div class="detail-item">
                    <div class="label">Geschätzte Dauer</div>
                    <div class="value">${formatDuration(totalMinutes)}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Verkehrsmittel</div>
                    <div class="value">${modeLabel}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Start</div>
                    <div class="value" style="font-size:0.85rem;">${startGeo.displayName.split(',')[0]}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Ziel</div>
                    <div class="value" style="font-size:0.85rem;">${zielGeo.displayName.split(',')[0]}</div>
                </div>
                <div class="detail-item">
                    <div class="label">Max. Regen</div>
                    <div class="value">${Math.max(...weatherResults.map(p => p.weather.precipitation)).toFixed(1)} mm</div>
                </div>
            `;

            // ============================================================
            // Slot-Timeline rendern
            // ============================================================
            if (slotResults && bestSlot) {
                renderSlotTimeline(slotResults, bestSlot);
            }

            // ============================================================
            // Wind (Fahrrad-Komfort-Index) rendern
            // ============================================================
            renderWindInfo(windAnalysis, totalMinutes, distKm);

            // ============================================================
            // Bonus (CO₂ & Kalorien) rendern
            // ============================================================
            renderBonus(distKm, totalMinutes, mode, weatherResults);

            DOM.resultCard.classList.add('visible');
            DOM.resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ============================================================
        // 6c. Wind-Info rendern (Fahrrad-Komfort-Index)
        // ============================================================
        function renderWindInfo(wind, totalMinutes, distKm) {
            const section = DOM.windSection;
            const feedbackEl = DOM.windFeedback;
            const metaEl = DOM.windMeta;
            const durationNoteEl = DOM.windDurationNote;

            if (!wind || !wind.show) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            section.className = 'wind-section wind-only-bicycle';

            // Feedback-Klasse
            const typeClassMap = {
                tailwind: 'tailwind',
                headwind: 'headwind',
                crosswind: 'crosswind',
                calm: 'calm',
            };
            feedbackEl.className = `wind-feedback ${typeClassMap[wind.type] || 'calm'}`;

            // Angepasste Dauer berechnen (für Anzeige)
            const baseMinutes = estimateDuration(distKm, currentSpeed) / 60;
            const diffMinutes = totalMinutes - baseMinutes;
            const diffSign = diffMinutes >= 0 ? '+' : '';
            const diffStr = Math.abs(diffMinutes) >= 0.5 ? `${diffSign}${Math.round(diffMinutes)} Min.` : '±0 Min.';

            if (wind.type === 'calm') {
                feedbackEl.textContent = '🍃 ' + wind.message;
                metaEl.innerHTML = `
                    <span>🌬️ ${wind.speed.toFixed(0)} km/h</span>
                    <span>🧭 Windstill</span>
                `;
                durationNoteEl.textContent = '';
            } else {
                feedbackEl.textContent = `${wind.icon} ${wind.message}`;
                metaEl.innerHTML = `
                    <span>🌬️ ${wind.speed.toFixed(0)} km/h</span>
                    <span>🧭 Wind: ${wind.windDirection}°</span>
                    <span>📍 Fahrt: ${wind.bearing}°</span>
                    <span>📐 Diff: ${wind.diff}°</span>
                `;
                if (wind.durationFactor !== 1.0) {
                    const pct = Math.round((wind.durationFactor - 1) * 100);
                    const pctSign = pct >= 0 ? '+' : '';
                    durationNoteEl.textContent = `⏱️ Dauer angepasst: ${pctSign}${pct}% (${diffStr})`;
                } else {
                    durationNoteEl.textContent = '⏱️ Keine Dauer-Anpassung durch Wind.';
                }
            }
        }

        // ============================================================
        // 6b. Slot-Timeline rendern
        // ============================================================
        function renderSlotTimeline(slotResults, bestSlot) {
            const container = DOM.slotTimeline;
            const recEl = DOM.slotRecommendation;
            container.innerHTML = '';

            const levelRank = { dry: 0, light: 1, moderate: 2, heavy: 3 };

            slotResults.forEach((slot) => {
                const isBest = slot.slotIndex === bestSlot.slotIndex;
                const worstLevel = slot.worst.advice.level;

                // Emoji für den Slot
                let emoji = '🟢';
                if (worstLevel === 'light') emoji = '🟡';
                else if (worstLevel === 'moderate') emoji = '🟠';
                else if (worstLevel === 'heavy') emoji = '🔴';

                // Beschreibung
                let desc = slot.worst.advice.label;
                if (slot.maxMm > 0) desc += ` (${slot.maxMm.toFixed(1)} mm)`;

                const div = document.createElement('div');
                div.className = `slot-item${isBest ? ' slot-best' : ''}`;
                div.innerHTML = `
                    <div class="slot-label">${slot.label}</div>
                    <div class="slot-icon">${emoji}</div>
                    <div class="slot-desc">${desc}</div>
                    ${isBest ? '<div class="slot-badge">⭐</div>' : ''}
                `;
                container.appendChild(div);
            });

            // Empfehlungstext
            const bestLabel = bestSlot.label;
            const bestLevel = bestSlot.worst.advice.level;
            const nowLevel = slotResults[0].worst.advice.level;

            if (bestLevel === 'dry' && nowLevel !== 'dry') {
                // Es regnet jetzt, aber später wird's trocken
                if (bestLabel === '+15m') {
                    recEl.textContent = '⏳ Warte noch kurz! In 15 Minuten bleibst du trocken.';
                } else if (bestLabel === '+30m') {
                    recEl.textContent = '⏳ Warte noch! In 30 Minuten bleibst du trocken.';
                } else if (bestLabel === '+45m') {
                    recEl.textContent = '⏳ Warte eine Weile! In 45 Minuten bleibst du trocken.';
                } else {
                    recEl.textContent = '✅ Jetzt ist der beste Zeitpunkt – du bleibst trocken!';
                }
            } else if (bestLevel === nowLevel && slotResults[0].maxMm === bestSlot.maxMm) {
                recEl.textContent = '✅ Jetzt ist bereits der beste Zeitpunkt zum Losgehen.';
            } else {
                // Alle Slots haben Regen – besten als "Beste Wahl" markieren
                const bestAdvice = bestSlot.worst.advice;
                recEl.textContent = `⭐ Beste Wahl: ${bestLabel} (${bestAdvice.icon} ${bestAdvice.label}, ${bestSlot.maxMm.toFixed(1)} mm) – geringster Niederschlag.`;
            }
        }

        function formatDuration(totalMinutes) {
            if (totalMinutes < 1) return '< 1 Min.';
            const hrs = Math.floor(totalMinutes / 60);
            const mins = Math.round(totalMinutes % 60);
            if (hrs > 0) {
                return `${hrs}h ${mins}min`;
            }
            return `${mins} Min.`;
        }

        function showError(msg) {
            DOM.errorMsg.textContent = msg;
            DOM.errorMsg.classList.add('visible');
        }

        function hideError() {
            DOM.errorMsg.textContent = '';
            DOM.errorMsg.classList.remove('visible');
        }

        // ============================================================
        // 7. Toggle-Buttons (Radio-Button-Verhalten)
        // ============================================================

        /**
         * Speichert die aktuellen Adressen aus den Eingabefeldern in localStorage.
         * Wird beim Umschalten des Verkehrsmittels und beim Checken aufgerufen.
         */
        function saveCurrentAddresses() {
            const startStr = DOM.start.value.trim();
            const zielStr = DOM.ziel.value.trim();
            if (startStr) localStorage.setItem('startLocation', startStr);
            if (zielStr) localStorage.setItem('zielLocation', zielStr);
        }

        function setMode(btn) {
            // Alle deaktivieren
            DOM.toggleBtns.forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-checked', 'false');
                b.setAttribute('tabindex', '-1');
            });
            // Ausgewählten aktivieren
            btn.classList.add('active');
            btn.setAttribute('aria-checked', 'true');
            btn.setAttribute('tabindex', '0');
            // Globale Variablen setzen
            currentMode = btn.dataset.mode;
            currentSpeed = parseFloat(btn.dataset.speed);

            // Adressen sofort speichern (damit sie auch ohne Check-Klick erhalten bleiben)
            saveCurrentAddresses();
        }

        DOM.toggleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                setMode(btn);
                checkWeather();
            });
        });

        // Initial: "Gehen" ist standardmäßig aktiv – Klasse ist schon im HTML gesetzt,
        // aber die globalen Variablen müssen initial gesetzt werden.
        (function initMode() {
            const activeBtn = document.querySelector('.toggle-btn.active');
            if (activeBtn) {
                currentMode = activeBtn.dataset.mode;
                currentSpeed = parseFloat(activeBtn.dataset.speed);
            }
        })();

        // ============================================================
        // 7b. Gespeicherte Adressen aus localStorage laden
        // ============================================================
        (function loadSavedLocations() {
            // defaultValues setzen (für Smart Clear)
            DOM.start.defaultValue = DOM.start.value;
            DOM.ziel.defaultValue = DOM.ziel.value;
            const savedStart = localStorage.getItem('startLocation');
            const savedZiel = localStorage.getItem('zielLocation');
            if (savedStart) {
                DOM.start.value = savedStart;
                DOM.start.defaultValue = savedStart;
            }
            if (savedZiel) {
                DOM.ziel.value = savedZiel;
                DOM.ziel.defaultValue = savedZiel;
            }
        })();

        // ============================================================
        // 8. Autocomplete / Suggestions – optimiert (schnell + PLZ)
        // ============================================================

        // Cache für Suggestions – Key = normalisierte Suchanfrage
        const suggestionsCache = {};

        // Smart Clear: Leert das Feld bei Fokus, wenn es den Default-Wert enthält
        function setupSmartClear(inputEl) {
            inputEl.addEventListener('focus', function onFocus() {
                const placeholder = inputEl.placeholder;
                const defaultValue = inputEl.defaultValue;
                const val = inputEl.value.trim();
                if (val === defaultValue || val === placeholder || val === '') {
                    inputEl.value = '';
                }
                const dropdown = inputEl.parentElement.querySelector('.suggestions-dropdown');
                if (inputEl.value.trim() === '') {
                    showHistorySuggestions(inputEl, dropdown);
                }
            });
        }

        // ============================================================
        // 8b. History-Vorschläge aus localStorage
        // ============================================================

        function getRecentAddresses(maxCount = 3) {
            const saved = new Set();
            const start = localStorage.getItem('startLocation');
            const ziel = localStorage.getItem('zielLocation');
            if (start && start.trim()) saved.add(start.trim());
            if (ziel && ziel.trim()) saved.add(ziel.trim());
            return Array.from(saved).slice(0, maxCount);
        }

        function showHistorySuggestions(inputEl, dropdownEl) {
            const history = getRecentAddresses(3);
            if (history.length === 0) return;

            dropdownEl.innerHTML = '';
            const header = document.createElement('div');
            header.style.cssText = 'padding:0.5rem 1rem 0.25rem;font-size:0.7rem;color:#999;text-transform:uppercase;letter-spacing:0.04em;font-weight:600;border-bottom:1px solid #f0f0f0;';
            header.textContent = '⏳ Zuletzt verwendet';
            dropdownEl.appendChild(header);

            history.forEach(addr => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                const plzMatch = addr.match(/\b(\d{5})\b/);
                const plzAnzeige = plzMatch ? ` <strong>[${plzMatch[1]}]</strong>` : '';
                div.innerHTML = `${addr}${plzAnzeige} <span class="suggestion-type">Verlauf</span>`;
                div.addEventListener('click', () => {
                    inputEl.value = addr;
                    dropdownEl.classList.remove('visible');
                });
                dropdownEl.appendChild(div);
            });
            dropdownEl.classList.add('visible');
        }

        /**
         * Extrahiert die Postleitzahl aus einem Nominatim-Ergebnis.
         */
        function extractPLZ(item) {
            // Photon: postcode direkt in properties
            if (item.postcode) {
                const m = String(item.postcode).match(/(\d{5})/);
                if (m) return m[1];
            }
            // Nominatim-Kompatibilität: über address-Objekt
            if (item.address && item.address.postcode) {
                const m = item.address.postcode.match(/(\d{5})/);
                if (m) return m[1];
            }
            if (item.display_name) {
                const m = item.display_name.match(/\b(\d{5})\b/);
                if (m) return m[1];
            }
            return null;
        }

        async function fetchSuggestions(query, signal) {
            if (query.length < 1) return [];
            const cacheKey = query.trim().toLowerCase();
            if (suggestionsCache[cacheKey]) return suggestionsCache[cacheKey];

            // Photon (komoot) Autocomplete – besseres Prefix-Matching als Nominatim
            const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=20&lang=de`;
            const resp = await fetch(url, { signal });
            if (!resp.ok) return [];
            const data = await resp.json();
            const features = data.features || [];
            // In ein einheitliches Format wie Nominatim umwandeln
            const results = features.map(f => {
                const props = f.properties || {};
                const geo = f.geometry?.coordinates || [0, 0];
                const typeMap = {
                    'highway': props.osm_type === 'N' ? 'bus_stop' : props.osm_value || 'road',
                    'amenity': 'amenity',
                    'place': props.osm_value || 'place',
                    'building': 'building',
                    'railway': 'railway',
                    'landuse': 'landuse',
                };
                return {
                    display_name: [props.name, props.city || props.locality || '', props.country || ''].filter(Boolean).join(', '),
                    lat: geo[1] || 0,
                    lon: geo[0] || 0,
                    type: typeMap[props.osm_key] || props.osm_key || props.osm_value || 'unknown',
                    addresstype: props.osm_key || props.osm_value || 'unknown',
                    address: { postcode: props.postcode || '' },
                };
            });
            suggestionsCache[cacheKey] = results;
            return results;
        }

        function getTypeLabel(item) {
            const type = item.type || item.addresstype || '';
            switch (type) {
                case 'house_number': return 'Hausnr.';
                case 'street': return 'Straße';
                case 'city': return 'Stadt';
                case 'town': return 'Stadt';
                case 'village': return 'Dorf';
                case 'state': return 'Bundesland';
                case 'country': return 'Land';
                case 'amenity': return 'Ort';
                case 'railway': return 'Bahnhof';
                case 'tourism': return 'Tourismus';
                default: return type;
            }
        }

        function renderSuggestions(inputEl, dropdownEl, data) {
            dropdownEl.innerHTML = '';
            if (!data || data.length === 0) {
                dropdownEl.classList.remove('visible');
                return;
            }
            // NUR Straßen (highway) – alles andere rigoros rausfiltern
            // Photon liefert osm_key='highway' mit osm_value wie residential, primary, secondary, tertiary, track, etc.
            const strassenTypen = ['street', 'road', 'residential', 'primary', 'secondary',
                                   'tertiary', 'trunk', 'motorway', 'service', 'living_street',
                                   'pedestrian', 'footway', 'cycleway', 'path', 'unclassified',
                                   'house_number', 'track', 'steps', 'bridleway'];
            let streetItems = data.filter(item => {
                const type = item.type || item.addresstype || '';
                return strassenTypen.includes(type);
            });
            if (streetItems.length === 0) {
                dropdownEl.classList.remove('visible');
                return;
            }
            const maxItems = 8;
            // Deduplizieren: gleicher Straßenname + gleiche Stadt nur einmal anzeigen
            const seen = new Set();
            const items = [];
            for (const item of streetItems) {
                const streetName = item.display_name.split(',')[0] || item.display_name;
                const city = (item.display_name.split(',')[1] || '').trim();
                const key = streetName.toLowerCase() + '|' + city.toLowerCase();
                if (seen.has(key)) continue;
                seen.add(key);
                items.push(item);
                if (items.length >= maxItems) break;
            }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                const streetName = item.display_name.split(',')[0] || item.display_name;
                const plz = extractPLZ(item);
                const plzAnzeige = plz ? ` <strong>[${plz}]</strong>` : '';
                div.innerHTML = `${streetName}${plzAnzeige}`;
                div.addEventListener('click', () => {
                    inputEl.value = plz ? `${streetName}, ${plz}` : streetName;
                    dropdownEl.classList.remove('visible');
                });
                dropdownEl.appendChild(div);
            });
            dropdownEl.classList.add('visible');
        }

        function hideAllDropdowns() {
            DOM.startSuggestions.classList.remove('visible');
            DOM.zielSuggestions.classList.remove('visible');
        }

        function setupAutocomplete(inputEl, dropdownEl) {
            let debounceTimer = null;

            inputEl.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                const val = inputEl.value.trim();
                if (val.length === 0) {
                    showHistorySuggestions(inputEl, dropdownEl);
                    return;
                }
                const currentVal = val;
                debounceTimer = setTimeout(async () => {
                    if (inputEl.value.trim() !== currentVal) return;
                    const data = await fetchSuggestions(currentVal);
                    if (inputEl.value.trim() !== currentVal) return;
                    renderSuggestions(inputEl, dropdownEl, data);
                }, 150);
            });

            inputEl.addEventListener('focus', () => {
                const val = inputEl.value.trim();
                if (val.length === 0) {
                    showHistorySuggestions(inputEl, dropdownEl);
                } else if (dropdownEl.children.length > 0) {
                    dropdownEl.classList.add('visible');
                } else if (val.length > 0) {
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(async () => {
                        const currentVal = val;
                        if (inputEl.value.trim() !== currentVal) return;
                        const data = await fetchSuggestions(currentVal);
                        if (inputEl.value.trim() !== currentVal) return;
                        renderSuggestions(inputEl, dropdownEl, data);
                    }, 150);
                }
            });

            inputEl.addEventListener('blur', () => {
                setTimeout(() => dropdownEl.classList.remove('visible'), 200);
            });

            // Tastatur-Navigation im Dropdown
            inputEl.addEventListener('keydown', (e) => {
                const items = dropdownEl.querySelectorAll('.suggestion-item');
                if (!items.length) return;

                const activeIdx = Array.from(items).findIndex(el => el.classList.contains('highlighted'));

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    const next = activeIdx < items.length - 1 ? activeIdx + 1 : 0;
                    items.forEach(el => el.classList.remove('highlighted'));
                    items[next].classList.add('highlighted');
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prev = activeIdx > 0 ? activeIdx - 1 : items.length - 1;
                    items.forEach(el => el.classList.remove('highlighted'));
                    items[prev].classList.add('highlighted');
                } else if (e.key === 'Enter') {
                    if (activeIdx >= 0) {
                        e.preventDefault();
                        items[activeIdx].click();
                    }
                } else if (e.key === 'Escape') {
                    dropdownEl.classList.remove('visible');
                }
            });
        }

        // Autocomplete für beide Felder aktivieren
        setupAutocomplete(DOM.start, DOM.startSuggestions);
        setupAutocomplete(DOM.ziel, DOM.zielSuggestions);

        // Smart Clear für beide Felder aktivieren
        setupSmartClear(DOM.start);
        setupSmartClear(DOM.ziel);

        // Dropdown schließen bei Klick außerhalb
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.autocomplete-wrapper')) {
                hideAllDropdowns();
            }
        });

        // ============================================================
        // 9. Event Listener
        // ============================================================

        // Swap-Button: Start und Ziel tauschen
        DOM.swapBtn = document.getElementById('swapBtn');
        DOM.swapBtn.addEventListener('click', () => {
            const temp = DOM.start.value;
            DOM.start.value = DOM.ziel.value;
            DOM.ziel.value = temp;
            // defaultValues ebenfalls tauschen
            const tempDefault = DOM.start.defaultValue;
            DOM.start.defaultValue = DOM.ziel.defaultValue;
            DOM.ziel.defaultValue = tempDefault;
            // Gespeicherte Adressen aktualisieren
            saveCurrentAddresses();
            // Dropdowns schließen
            hideAllDropdowns();
        });

        // Geo-Button: Aktuellen Standort per Reverse Geocoding ermitteln
        DOM.geoBtn = document.getElementById('geoBtn');
        DOM.geoBtn.addEventListener('click', async () => {
            if (!navigator.geolocation) {
                showError('Geolocation wird von deinem Browser nicht unterstützt.');
                return;
            }

            // loading-Zustand setzen (CSS-Klasse + aria)
            DOM.geoBtn.classList.add('loading');
            DOM.geoBtn.textContent = '⏳';
            DOM.geoBtn.setAttribute('aria-label', 'Standort wird ermittelt...');
            DOM.geoBtn.disabled = true;

            // Vorherige Requests abbrechen
            if (activeController) {
                activeController.abort();
            }
            activeController = new AbortController();
            const signal = activeController.signal;

            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 300000
                    });
                });
                const { latitude, longitude } = pos.coords;
                // Reverse Geocoding via Nominatim
                const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&addressdetails=1`;
                const resp = await fetch(url, {
                    headers: { 'User-Agent': 'BleibeIchTrocken/1.0' },
                    signal,
                });
                if (!resp.ok) throw new Error('Reverse Geocoding fehlgeschlagen');
                const data = await resp.json();
                const adresse = data.display_name || `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                DOM.start.value = adresse;
                DOM.start.defaultValue = adresse;
                saveCurrentAddresses();
                hideAllDropdowns();
            } catch (err) {
                if (err.name === 'AbortError') return;
                if (err.code === 1) {
                    showError('Bitte Standortzugriff erlauben, um den aktuellen Ort zu nutzen.');
                } else {
                    showError('Standort konnte nicht ermittelt werden: ' + err.message);
                }
            } finally {
                DOM.geoBtn.classList.remove('loading');
                DOM.geoBtn.textContent = '📍';
                DOM.geoBtn.setAttribute('aria-label', 'Aktuellen Standort verwenden');
                DOM.geoBtn.disabled = false;
                activeController = null;
            }
        });
        DOM.checkBtn.addEventListener('click', checkWeather);

        // Enter-Taste: Start → springt zu Ziel, Ziel → checkt
        DOM.start.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                DOM.ziel.focus();
            }
        });
        DOM.ziel.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkWeather();
            }
        });

        // Auto-Check beim Laden entfernt – Seite startet ruhig, kein Sprung nach unten
    </script>
</body>
</html>
